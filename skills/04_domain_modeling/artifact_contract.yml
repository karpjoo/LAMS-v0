contract_version: 1.0.0
skill:
  name: 04_domain_modeling
  stage: 04 Domain Modeling / DDD
  title: Domain Modeling / DDD
  skill_path: /skills/04_domain_modeling/SKILL.md
  readme_path: /skills/04_domain_modeling/README.md
  primary_output: /workflow/04_domain/result.md
  requires_human_approval: true
  internal_split: true
stage_contract:
  public_interface: true
  internal_split: true
  finalizer_required: true
  downstream_depends_on:
  - approved_stage_artifacts
  downstream_must_not_depend_on:
  - internal_subskill_outputs
  - subskill_folder_names
  - prompt_history
  - agent_chat_history
  - unapproved_draft_outputs
subskills:
  execution_order:
  - id: 04a
    name: ubiquitous_language
    path: /skills/04_domain_modeling/04a_ubiquitous_language/SKILL.md
    primary_output: /workflow/04_domain/04_ubiquitous_language.md
  - id: 04b
    name: domain_concepts_entities_values
    path: /skills/04_domain_modeling/04b_domain_concepts_entities_values/SKILL.md
    primary_output: /workflow/04_domain/04_domain_model.md
  - id: 04c
    name: aggregates_rules_lifecycle
    path: /skills/04_domain_modeling/04c_aggregates_rules_lifecycle/SKILL.md
    primary_output: /workflow/04_domain/04_business_rules_invariants.md
  - id: 04d
    name: events_bounded_contexts
    path: /skills/04_domain_modeling/04d_events_bounded_contexts/SKILL.md
    primary_output: /workflow/04_domain/04_domain_events.md
  - id: 04e
    name: domain_modeling_finalizer
    path: /skills/04_domain_modeling/04e_domain_modeling_finalizer/SKILL.md
    primary_output: /workflow/04_domain/result.md
purpose:
  summary: Orchestrate split Stage 4 Domain Modeling / DDD and preserve the public artifact contract for Stage 5.
  core_question: What domain language, concepts, rules, consistency boundaries, events, and bounded contexts must later architecture,
    data design, testing, and implementation preserve?
input_contract:
  always_read:
  - path: /workflow/context/artifact_manifest.yml
    required: true
    purpose: Artifact existence, status, approval, and supersession information.
    source_of_truth: true
    approval_required: true
  - path: /workflow/context/context_packet.md
    required: true
    purpose: Minimal operational context from the previous stage.
    source_of_truth: true
    approval_required: true
  - path: /workflow/context/DECISIONS.md
    required: true
    purpose: Human-approved decisions only.
    source_of_truth: true
    approval_required: true
  - path: /workflow/context/ASSUMPTIONS.md
    required: false
    purpose: Active working assumptions that must not be treated as decisions.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/OPEN_QUESTIONS.md
    required: false
    purpose: Open questions that may affect domain modeling.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/REJECTED_OPTIONS.md
    required: false
    purpose: Rejected or superseded options that must not be revived silently.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    required: false
    purpose: Existing goal-to-requirement traceability context.
    source_of_truth: false
    approval_required: false
  - path: /workflow/01_goal/01_service_goal.md
    required: true
    purpose: Approved service goal and non-goals.
    source_of_truth: true
    approval_required: true
  - path: /workflow/02_stakeholders_risk/02_stakeholders.md
    required: true
    purpose: Stakeholders, roles, and role semantics.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_requirements.md
    required: true
    purpose: Approved requirements.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_acceptance_criteria.md
    required: true
    purpose: Approved acceptance criteria.
    source_of_truth: true
    approval_required: true
  read_if_applicable:
  - path: /workflow/00_intake/00_project_intake.md
    condition: Project type, fixed constraints, or non-changeable areas affect domain modeling.
    purpose: Apply project profile and fixed constraints.
  - path: /workflow/00_intake/00_existing_context_review.md
    condition: The project is brownfield, legacy, migration, extension, or compatibility-sensitive.
    purpose: Preserve existing terminology and compatibility constraints without treating implementation names as domain truth.
  - path: /workflow/02_stakeholders_risk/02_risk_privacy_screening.md
    condition: Roles, permissions, sensitive data, compliance, audit, security, or privacy affect domain rules.
    purpose: Preserve risk-sensitive domain language and constraints.
  - path: /workflow/03_requirements/03_traceability_matrix.md
    condition: Stage 3 produced a traceability matrix.
    purpose: Preserve requirement and acceptance-criteria IDs.
  - path: /workflow/context/APPROVAL_LOG.md
    condition: Approval status is ambiguous.
    purpose: Confirm which artifacts and decisions are approved.
  - path: /workflow/04_domain/USER_DIRECTIVES.md
    condition: The file exists.
    purpose: Apply stage-local human instructions before agent assumptions.
  - path: /workflow/04_domain/review_notes.md
    condition: Revising prior Stage 4 drafts.
    purpose: Apply human review comments and corrections.
  - path: /workflow_templates/specializations/*.md
    condition: Project profile activates a specialization addendum.
    purpose: Apply project-type additions without replacing Stage 4 rules.
  do_not_read_by_default:
  - path_or_pattern: /skills/04_domain_modeling/*/internal_notes.md
    reason: Internal notes are not official source of truth.
  - path_or_pattern: /workflow/05_architecture/**
    reason: Downstream architecture drafts must not drive domain modeling.
  - path_or_pattern: /workflow/06_data/**
    reason: Data design belongs to a later stage.
  - path_or_pattern: implementation source code
    reason: Do not infer greenfield domain truth from code unless brownfield review is explicitly applicable.
  - path_or_pattern: full historical agent logs
    reason: Use artifacts, not prompt history.
  missing_input_handling:
    missing_required_input: Report under Missing Information; mark blocking when service goal, requirements, acceptance criteria,
      artifact status, or role-driving stakeholder data is unavailable.
    missing_stage_input: Continue only with clearly labeled assumptions when safe; otherwise stop with a blocker report.
    no_project_context: Do not run Stage 4 as if source artifacts exist; request project context or produce only a blocker
      report.
    conflicting_inputs: Report conflicting sources and do not silently resolve conflicts affecting scope, domain rules, security,
      privacy, or Stage 5 handoff.
    draft_or_unapproved_inputs: Use only if explicitly allowed or clearly marked as draft; preserve Draft status and require
      human review.
user_directives:
  path: /workflow/04_domain/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing any sub-skill.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
output_contract:
  official_stage_artifacts:
  - path: /workflow/04_domain/04_ubiquitous_language.md
    purpose: Preferred domain terminology and language handoff.
    required: true
    approval_required: true
    status_values: &id001
    - Draft
    - Approved
    - Needs Review
    required_sections:
    - Status
    - Language Scope
    - Preferred Domain Terms
    - Synonyms and Deprecated Terms
    - Ambiguous or Conflicting Terms
    - Terms to Preserve in Later Stages
  - path: /workflow/04_domain/04_domain_model.md
    purpose: Core domain concepts, entities, value objects, services, policies, relationships, aggregates, and uncertainties.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Status
    - Domain Overview
    - Core Domain Concepts
    - Entities
    - Value Objects
    - Aggregates
    - Domain Services / Policies
    - External Domain Actors or Systems
    - Modeling Uncertainties
  - path: /workflow/04_domain/04_bounded_contexts.md
    purpose: Bounded contexts, context relationships, and single-context or split-context rationale.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Status
    - Context Strategy Summary
    - Bounded Contexts
    - Context Relationships
    - Single-Context Rationale, if Applicable
    - Context Split Candidates Requiring Approval
  - path: /workflow/04_domain/04_business_rules_invariants.md
    purpose: Business rules, invariants, state transition rules, and rule gaps.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Status
    - Business Rules
    - Invariants
    - State Transition Rules
    - Rule Conflicts or Gaps
  - path: /workflow/04_domain/04_domain_events.md
    purpose: Business-significant domain events and rejected technical/UI event candidates.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Status
    - Domain Events
    - Event Ordering or Causality Notes
    - Events Rejected as Technical or UI Events
    - Event Open Questions
  - path: /workflow/04_domain/04_domain_traceability_matrix.md
    purpose: Requirement-to-domain and domain-to-future-stage traceability.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Status
    - Requirement to Domain Links
    - Domain to Future Stage Links
    - Traceability Gaps
  - path: /workflow/04_domain/result.md
    purpose: Stage 4 execution summary, assumptions, questions, risks, N/A records, and approval gate.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Task Summary
    - Inputs Used
    - Outputs Created or Updated
    - Domain Modeling Summary
    - Decision Candidates
    - Working Assumptions
    - Open Questions
    - Risks and Constraints
    - Traceability Updates
    - Conditional Artifacts Not Created
    - Human Approval Required
    - Recommended Next Step
  - path: /workflow/context/context_packet.md
    purpose: Stage 5 handoff context.
    required: true
    approval_required: false
    status_values: *id001
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
  conditional_artifacts:
  - path: /workflow/04_domain/04_state_lifecycle.md
    condition: Lifecycle-bearing concepts or meaningful state transitions exist.
    purpose: Lifecycle/state model for domain concepts.
    n_a_record_required: true
  - path: /workflow/04_domain/04_context_map.md
    condition: Multiple contexts, external contexts, or brownfield context relationships exist.
    purpose: Context map and relationship summary.
    n_a_record_required: true
  - path: /workflow/04_domain/04_domain_risk_notes.md
    condition: Security, privacy, compliance, audit, sensitive data, or model risk affects domain rules.
    purpose: Risk-sensitive domain notes and language to preserve.
    n_a_record_required: true
  - path: /workflow/04_domain/04_domain_model_diagrams.md
    condition: Diagrams clarify aggregates, contexts, or state transitions.
    purpose: Optional diagrams for human review and handoff.
    n_a_record_required: true
  - path: /workflow/04_domain/04_domain_open_questions.md
    condition: Domain open questions are substantial enough to need a stage-local file.
    purpose: Stage-local list of significant domain questions.
    n_a_record_required: true
  n_a_record:
    required: true
    record_location: /workflow/04_domain/result.md
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
  internal_subskill_outputs:
    visibility: internal
    downstream_dependency_allowed: false
    finalizer_required_before_stage_approval: true
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Always update or prepare by the finalizer for Stage 5.
    update_rule: Include only the minimum operational context needed by Stage 5.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions exist.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions exist.
    update_rule: Record questions that may affect later stages.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update if options were explicitly rejected or superseded.
    update_rule: Do not revive rejected options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if traceability links are introduced or changed.
    update_rule: Use stable IDs and preserve existing links.
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Prepare minimal context for Stage 5 Architecture & Technical Contracts.
    next_stage: 05_architecture_contracts
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
traceability:
  id_conventions:
    domain_terms: TERM-001, TERM-002
    concepts: DC-001, DC-002
    entities: ENT-001, ENT-002
    value_objects: VO-001, VO-002
    aggregates: AGG-001, AGG-002
    business_rules: BR-001, BR-002
    invariants: INV-001, INV-002
    state_transitions: ST-001, ST-002
    domain_events: EVT-001, EVT-002
    bounded_contexts: BC-001, BC-002
    traceability_gaps: TG-001, TG-002
  required_links:
  - Requirement -> Acceptance Criteria -> Domain Term
  - Requirement -> Domain Concept
  - Requirement -> Business Rule / Invariant
  - Acceptance Criteria -> State Transition / Rule / Event
  - Domain Concept -> Bounded Context
  - Aggregate -> Invariant
  - Invariant -> Future Unit or Scenario Test Target
  - State Transition -> Future Scenario Test Target
  - Domain Event -> Future Integration or Audit Test Target
  - Bounded Context -> Future Module / Architecture Boundary Candidate
  - Aggregate -> Future Transaction Boundary Candidate
  prohibited_links:
  - Domain Concept -> final Database Table
  - Aggregate -> final Microservice
  - Domain Event -> final Message Broker Topic
  - Bounded Context -> final Deployment Unit
  - Entity -> final ORM Model
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
    examples:
    - Approved aggregate boundaries after Stage 4 review.
    - Approved preferred domain terminology.
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect later work must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  prepared_by: /skills/04_domain_modeling/04e_domain_modeling_finalizer/SKILL.md
  decisions_to_approve:
  - Preferred ubiquitous language terms
  - Entity and value object classifications
  - Aggregate roots and aggregate boundaries
  - Business rules and invariants
  - State lifecycle model, if applicable
  - Domain events
  - Bounded contexts and context relationships
  - Single-context rationale, if applicable
  assumptions_to_confirm:
  - Any assumptions that affect domain rules, lifecycle, context boundaries, security, privacy, or Stage 5 architecture decisions.
  open_questions_to_resolve:
  - Questions that block architecture, authorization, data ownership, integration, or testing decisions.
  risks_to_review:
  - Security, privacy, audit, compliance, sensitive data, model risk, and role/permission domain risks.
  artifacts_ready_for_review:
  - /workflow/04_domain/04_ubiquitous_language.md
  - /workflow/04_domain/04_domain_model.md
  - /workflow/04_domain/04_bounded_contexts.md
  - /workflow/04_domain/04_business_rules_invariants.md
  - /workflow/04_domain/04_domain_events.md
  - /workflow/04_domain/04_domain_traceability_matrix.md
  - /workflow/04_domain/result.md
validation:
  checklist:
  - Sub-skill execution order is complete.
  - Finalizer has run.
  - Official artifacts exist or N/A rationale is recorded.
  - Traceability links are updated or gaps are recorded.
  - Decision candidates, assumptions, open questions, risks, and rejected options are separated.
  - Stage 5 handoff lists official artifacts, not sub-skill internals.
  failure_conditions:
  - Missing or unapproved required source artifacts.
  - Contradictory requirements or acceptance criteria.
  - Missing stakeholder role semantics when role behavior drives the domain.
  - Unresolved privacy/security conflicts that affect domain operations.
  - Sub-skill outputs cannot be reconciled safely.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not execute the workflow while creating support files.
- Do not create project artifacts under /workflow when maintaining this reusable package.
- Do not make Stage 5 depend on sub-skill paths.
- Do not update DECISIONS.md without explicit human approval.
- Do not design database tables, API endpoints, UI screens, architecture style, implementation tasks, or code.
specialization_hooks:
  allowed: true
  examples:
  - name: web_saas
    may_add:
    - account, tenant, organization, workspace, role, permission, billing, audit concepts
  - name: internal_tool
    may_add:
    - operator workflows, approval chains, exception handling, organizational role language
  - name: mobile_app
    may_add:
    - device/user/session concepts, offline state, synchronization only when domain-relevant
  - name: ai_data_product
    may_add:
    - dataset, sample, label, model output, review, evaluation, human override, provenance concepts
  - name: regulated_security_sensitive
    may_add:
    - consent, retention, access grant, audit event, policy, review, risk status, compliance evidence
  - name: brownfield_legacy
    may_add:
    - implementation-name vs domain-name distinction, compatibility constraints, migration-safe context candidates
  must_not_change:
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
tool_wrapper_hooks:
  allowed:
  - file_creation_commands
  - save_locations
  - sandbox_rules
  - review_workflow
  - command_invocation_conventions
  must_not_change:
  - stage_reasoning
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
