contract_version: 1.0.0
skill:
  name: 07_mvp_release_slicing
  stage: 07 MVP Scope & Release Slicing
  title: MVP Scope & Release Slicing
  skill_path: /skills/07_mvp_release_slicing/SKILL.md
  readme_path: /skills/07_mvp_release_slicing/README.md
  primary_output: /workflow/07_mvp_release/result.md
  requires_human_approval: true
  internal_split: true
purpose:
  summary: Orchestrate Stage 7 as a split package that defines MVP scope, release slices, out-of-scope items, and Stage 8 handoff.
  core_question: What is the smallest coherent MVP, what is deferred or out of scope, and what release order should be approved before validation planning?
stage_contract:
  public_interface: true
  downstream_depends_on:
  - approved_stage_artifacts
  downstream_must_not_depend_on:
  - internal_subskill_outputs
  - subskill_folder_names
  - prompt_history
  - unapproved_drafts
  previous_stage: 06 Data Design
  next_stage: 08 Test Strategy & Validation Harness
subskills:
  execution_order:
  - id: 07a
    name: scope_input_review
    path: /skills/07_mvp_release_slicing/07a_scope_input_review/SKILL.md
  - id: 07b
    name: mvp_scope_classification
    path: /skills/07_mvp_release_slicing/07b_mvp_scope_classification/SKILL.md
  - id: 07c
    name: release_slicing_dependency
    path: /skills/07_mvp_release_slicing/07c_release_slicing_dependency/SKILL.md
  - id: 07d
    name: out_of_scope_deferral_risk
    path: /skills/07_mvp_release_slicing/07d_out_of_scope_deferral_risk/SKILL.md
  - id: 07e
    name: mvp_release_finalizer
    path: /skills/07_mvp_release_slicing/07e_mvp_release_finalizer/SKILL.md
  finalizer_required: true
