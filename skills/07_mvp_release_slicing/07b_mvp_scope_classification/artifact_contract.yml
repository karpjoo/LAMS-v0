  do_not_read_by_default:
  - path_or_pattern: full historical agent logs
    reason: Avoid dependence on prompt history.
  - path_or_pattern: superseded artifacts
    reason: Do not use stale artifacts as current truth.
  - path_or_pattern: unrelated drafts
    reason: Only approved or explicitly requested drafts may affect the sub-SKILL.
  - path_or_pattern: /workflow/08_test_strategy/**
    reason: Test strategy belongs to Stage 8.
  - path_or_pattern: /workflow/09_tasks/**
    reason: Task breakdown belongs to Stage 9.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters, mark blocking or non-blocking, and stop if the sub-SKILL cannot safely proceed.
    missing_stage_input: Create only safe partial analysis when official Stage 7 inputs are missing.
    no_project_context: Stop unless the human explicitly requests exploratory work.
    conflicting_inputs: Report the conflict and affected artifacts; do not silently resolve it.
    draft_or_unapproved_inputs: Use only if explicitly instructed and label outputs as draft.
user_directives:
  path: /workflow/07_mvp_release/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
  - Do not modify USER_DIRECTIVES.md unless explicitly instructed.
output_contract:
  mandatory_artifacts:
  - path: /workflow/07_mvp_release/07_mvp_scope.md
    purpose: Defines MVP scope classification, supporting/enabling scope, risks, assumptions, and human approval needs.
    required: true
    approval_required: true
    status_values: &id001
    - Draft
    - Approved
    - Needs Review
    required_sections:
    - Stage Status
    - MVP Definition Summary
    - Scope Classification Method
    - MVP Must-Have Scope
    - MVP Supporting / Enabling Scope
    - Should-Have Candidates
    - Could-Have Candidates
    - Later Release Items
    - Won't / Non-Scope Items
    - Security / Privacy / Compliance Scope Notes
    - Operational / Deployment Scope Notes
    - Scope Risks
    - Decision Candidates
    - Working Assumptions
    - Open Questions
    - Human Approval Required
  - path: /workflow/07_mvp_release/_internal/07b_mvp_scope_classification_notes.md
    purpose: Records classification reasoning and handoff notes for 07c.
    required: true
    approval_required: false
    status_values: *id001
    required_sections:
    - Classification Rationale
    - Ambiguities
    - Dependency Notes
    - Handoff to 07c
  conditional_artifacts: []
  n_a_record:
    required: false
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Only the finalizer updates the Stage 8 context packet; earlier sub-SKILLs may prepare local handoff notes.
    update_rule: Do not replace the public context packet before finalizer unless explicitly instructed.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions need persistence.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions need persistence.
    update_rule: Record questions that may affect later stages.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update only for explicitly rejected or superseded options.
    update_rule: Do not revive rejected options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if traceability links are introduced or changed.
    update_rule: Use stable IDs and preserve existing links.
  local_handoff:
    purpose: Prepare the next sub-SKILL with only the minimum operational context.
    next_subskill: /skills/07_mvp_release_slicing/07c_release_slicing_dependency/SKILL.md
traceability:
  id_conventions:
    scope_items: SCOPE-001, SCOPE-002
    release_slices: REL-001, REL-002
    deferred_items: DEF-001, DEF-002
    non_scope_items: NON-SCOPE-001, NON-SCOPE-002
    risks: RISK-001, RISK-002
  required_links:
  - Requirement -> Acceptance Criteria
  - Requirement -> Scope Category
  - Requirement -> Release Slice or Deferral Status
  prohibited_links:
  - Do not create task or implementation evidence links during Stage 7.
  - Do not expose internal working artifacts as downstream source of truth.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
    examples:
    - 'Approved: MVP includes only the selected Must scope items.'
    - 'Approved: Release 1 excludes advanced reporting.'
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect scope, validation, security, data, or release order must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  decisions_to_approve:
  - MVP Must scope
  - MVP supporting/enabling scope
  - Should/Could/Later/Won't classification
  - Scope classification trade-offs
  assumptions_to_confirm:
  - Working assumptions that affect MVP scope or release order.
  open_questions_to_resolve:
  - Questions that may affect this sub-SKILL or Stage 8 handoff.
  risks_to_review:
  - Risks introduced or discovered by this sub-SKILL.
  artifacts_ready_for_review:
  - /workflow/07_mvp_release/07_mvp_scope.md
validation:
  checklist:
  - Inputs were checked according to the sub-SKILL contract.
  - Outputs match the sub-SKILL artifact contract.
  - Assumptions, open questions, risks, and decision candidates are separated.
  - No downstream stage depends on internal working artifacts.
  - No implementation tasks, tests, prompts, or code were created.
  failure_conditions:
  - Required input is missing.
  - Source artifact approval status is unknown.
  - Inputs conflict in a way that affects scope or release order.
  - Security/privacy/data/architecture constraints make the proposed output unsafe.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not execute later Stage 7 sub-SKILLs automatically.
- Do not create Stage 8 test strategy.
- Do not create Stage 9 task cards.
- Do not write implementation prompts or code.
- Do not update DECISIONS.md without explicit human approval.
- Do not treat this internal sub-SKILL output as approved public Stage 7 result.
