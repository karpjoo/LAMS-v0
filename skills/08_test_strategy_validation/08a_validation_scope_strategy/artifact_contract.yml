  read_if_applicable:
  - path: /workflow/00_intake/00_existing_context_review.md
    condition: Brownfield, migration, extension, or existing-codebase project.
    purpose: Support regression, compatibility, or existing command baseline decisions.
  - path: /workflow/02_stakeholders_risk/02_risk_privacy_screening.md
    condition: Security, privacy, permissions, compliance, abuse, or operational risks affect validation.
    purpose: Add risk-based validation coverage.
  - path: /workflow/04_domain/04_business_rules_invariants.md
    condition: Domain invariants or state transitions require validation.
    purpose: Connect business rules to tests.
  - path: /workflow/05_architecture/05_api_contracts.md
    condition: API behavior must be validated.
    purpose: Support API/contract validation.
  - path: /workflow/05_architecture/05_integration_contracts.md
    condition: External integrations or async workflows exist.
    purpose: Support integration and dependency validation.
  - path: /workflow/06_data/06_data_security_rules.md
    condition: Data access control, tenant isolation, or role-based data visibility exists.
    purpose: Support data-security validation.
  - path: /workflow/07_mvp_release/07_out_of_scope.md
    condition: Non-MVP scope must be excluded from validation.
    purpose: Prevent validation scope creep.
  do_not_read_by_default:
  - path_or_pattern: prompt history or raw agent logs
    reason: Not a source of truth.
  - path_or_pattern: superseded or rejected artifacts
    reason: Must not be used as current validation basis.
  - path_or_pattern: /workflow/09_tasks/**
    reason: Stage 9 is downstream.
  - path_or_pattern: /workflow/10_prompts/**
    reason: Implementation prompt writing is downstream.
  - path_or_pattern: /workflow/11_implementation_results/**
    reason: Implementation evidence is downstream.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters, classify it as blocking or non-blocking, and stop if unsafe.
    missing_stage_input: Create only safe partial output with labeled assumptions if progress is possible.
    no_project_context: Stop and request project context rather than inventing validation scope.
    conflicting_inputs: Report conflicts and stop if they affect scope, security, privacy, architecture, data, or validation coverage.
    draft_or_unapproved_inputs: Use only as draft context when explicitly allowed; do not treat as source of truth.
user_directives:
  path: /workflow/08_test_strategy/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the sub-SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Report conflicts with approved decisions.
  - Do not modify USER_DIRECTIVES.md unless explicitly instructed.
output_contract:
  mandatory_artifacts:
  - path: /workflow/08_test_strategy/08_test_strategy.md
    purpose: Validation strategy and requirement-to-validation method mapping
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  conditional_artifacts: []
  n_a_record:
    required: false
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
  required_sections:
  - Status
  - Purpose
  - Inputs Used
  - Validation Scope
  - Test Levels
  - Requirement-to-Validation Strategy
  - Risk-Based Test Priorities
  - Test Data and Fixture Strategy
  - Environment and Dependency Strategy
  - Validation Commands Summary
  - CI Applicability
  - Non-Automated Validation Rationale
  - Validation Gaps
  - Decision Candidates
  - Working Assumptions
  - Open Questions
  - Approval Required
context_updates:
  files_to_update:
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions exist.
    update_rule: Do not convert assumptions to decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved validation questions exist.
    update_rule: Record questions affecting later stages.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if this sub-SKILL introduces or changes traceability links.
    update_rule: Use stable IDs and preserve existing links.
  handoff_target: /skills/08_test_strategy_validation/08b_acceptance_test_design/SKILL.md
  handoff_rule: Prepare enough context for the next sub-SKILL, but the finalizer prepares Stage 9 handoff.
traceability:
  required_links:
  - Requirement ID -> Acceptance Criteria ID
  - Acceptance Criteria ID -> Acceptance Test ID or Validation Method
  - Acceptance Test ID -> Command ID or Manual Test ID when known
  - Validation Gap ID -> Affected Requirement or Acceptance Criteria
  prohibited_links:
  - Do not invent Stage 9 task IDs.
  - Do not claim implementation evidence exists before Stage 11.
  - Do not treat placeholders as executed commands.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues affecting validation or later task planning must be recorded.
  rejected_option:
    rule: Rejected or superseded options must not be revived unless reopened.
approval_gate:
  required: true
  local_review_focus:
  - Which MVP requirements and acceptance criteria must be validated, at what test level, with what priority and risk rationale?
  stage_level_approval_finalized_by: /skills/08_test_strategy_validation/08e_test_strategy_finalizer/SKILL.md
  artifacts_ready_for_review:
  - /workflow/08_test_strategy/08_test_strategy.md
validation:
  checklist:
  - Required inputs were checked.
  - Missing inputs were classified.
  - Assumptions, open questions, risks, and decision candidates are separated.
  - Output artifact uses required sections.
  - Traceability links are preserved or updated.
  - No downstream implementation tasks or code were created.
  failure_conditions:
  - Required approved input is missing.
  - Input conflict affects validation coverage.
  - User directive conflicts with approved decision.
  - Output would require inventing requirements, scope, architecture, commands, or tests.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not execute the sub-SKILL while creating this support file.
- Do not create project artifacts under /workflow while creating this support file.
- Do not treat sub-SKILL output as approved stage result.
- Do not make Stage 9 depend on this internal sub-SKILL path.
- Do not update DECISIONS.md without explicit human approval.
