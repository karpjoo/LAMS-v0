contract_version: 1.0.0
skill:
  name: 06e_data_design_finalizer
  stage: 06 Data Design
  title: 06e Data Design Finalizer
  skill_path: /skills/06_data_design/06e_data_design_finalizer/SKILL.md
  readme_path: /skills/06_data_design/06e_data_design_finalizer/README.md
  primary_output: /workflow/06_data/result.md
  requires_human_approval: true
purpose:
  summary: Consolidate Stage 6 artifacts, resolve contradictions, update traceability, record N/A items, prepare result.md,
    update context_packet.md for Stage 7, and present the approval gate.
  core_question: Are the Stage 6 data design artifacts complete, consistent, traceable, and safe enough for human review and
    downstream MVP slicing?
input_contract:
  always_read:
  - path: /workflow/context/artifact_manifest.yml
    required: true
    purpose: Track artifact existence, status, approval, and supersession.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/context_packet.md
    required: true
    purpose: Read the minimal operational context prepared by the previous stage.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/DECISIONS.md
    required: true
    purpose: Use only human-approved decisions as source of truth.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/ASSUMPTIONS.md
    required: false
    purpose: Check active working assumptions that may affect data design.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/OPEN_QUESTIONS.md
    required: false
    purpose: Check unresolved questions that may affect schema, access, retention, or migration.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/REJECTED_OPTIONS.md
    required: false
    purpose: Avoid reviving rejected or superseded data or architecture options.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    required: false
    purpose: Preserve links across requirements, domain, architecture, data, tasks, tests, and evidence.
    source_of_truth: false
    approval_required: false
  - path: /workflow/context/APPROVAL_LOG.md
    required: false
    purpose: Confirm explicit human approvals when available.
    source_of_truth: false
    approval_required: false
  - path: /workflow/06_data/06_conceptual_data_model.md
    required: true
    purpose: Consolidate conceptual model.
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_logical_schema.md
    required: true
    purpose: Consolidate logical schema.
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_query_patterns.md
    required: true
    purpose: Consolidate query patterns.
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_physical_schema.md
    required: false
    purpose: 'Consolidate if applicable: Concrete storage structures, transaction boundaries, and storage-specific trade-offs.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_indexes.md
    required: false
    purpose: 'Consolidate if applicable: Index strategy linked to query patterns and trade-offs.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_data_security_rules.md
    required: false
    purpose: 'Consolidate if applicable: Create/read/update/delete/export/restore rule intent by role, condition, and enforcement
      layer.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_retention_deletion_policy.md
    required: false
    purpose: 'Consolidate if applicable: Retention/deletion rules and lifecycle obligations.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_migration_plan.md
    required: false
    purpose: 'Consolidate if applicable: Migration items, validation checks, ordering, and rollback/recovery concepts.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_data_dictionary.md
    required: false
    purpose: 'Consolidate if applicable: Data field definitions and classifications.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_seed_fixture_strategy.md
    required: false
    purpose: 'Consolidate if applicable: Seed/fixture purpose, environment, sensitivity, and refresh behavior.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_external_data_mapping.md
    required: false
    purpose: 'Consolidate if applicable: External data ownership, mapping, sync, and transformation notes.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_event_data_model.md
    required: false
    purpose: 'Consolidate if applicable: Event data structure and retention/audit implications.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_analytics_reporting_model.md
    required: false
    purpose: 'Consolidate if applicable: Analytics/reporting data structures and freshness assumptions.'
    source_of_truth: true
    approval_required: false
  - path: /workflow/06_data/06_blob_object_storage_model.md
    required: false
    purpose: 'Consolidate if applicable: Blob/object metadata, storage keys, retention, access, and lifecycle behavior.'
    source_of_truth: true
    approval_required: false
  read_if_applicable:
  - path: /workflow/00_intake/00_existing_context_review.md
    condition: If this is a brownfield or migration project.
    purpose: Capture existing data stores, constraints, compatibility, and migration risks.
  - path: /workflow/04_domain/04_bounded_contexts.md
    condition: If bounded contexts exist.
    purpose: Align data ownership with bounded contexts.
  - path: /workflow/04_domain/04_domain_events.md
    condition: If events, workflows, or async behavior exist.
    purpose: Identify event data, audit trails, and derived projections.
  - path: /workflow/05_architecture/05_api_contracts.md
    condition: If APIs exist.
    purpose: Derive read/write/query patterns and data contract needs.
  - path: /workflow/05_architecture/05_integration_contracts.md
    condition: If external systems exist.
    purpose: Map imported, exported, synchronized, and externally owned data.
  - path: /workflow/05_architecture/05_authz_model.md
    condition: If roles or permissions affect data visibility or mutation.
    purpose: Design data security rules and authorization-aware query constraints.
  - path: /workflow/05_architecture/05_event_contracts.md
    condition: If async messaging or domain events exist.
    purpose: Define event payload persistence and event-related data models.
  - path: /workflow/05_architecture/05_observability_policy.md
    condition: If audit, logging, monitoring, or observability data exists.
    purpose: Classify operational data and retention requirements.
  - path: /workflow/05_architecture/05_error_handling_policy.md
    condition: If error state must be persisted or audited.
    purpose: Design error, retry, dead-letter, or recovery data behavior.
  do_not_read_by_default:
  - path_or_pattern: full historical agent logs
    reason: Prompt history is not a source of truth.
  - path_or_pattern: unrelated previous stage drafts
    reason: Use approved artifacts and relevant current drafts only.
  - path_or_pattern: superseded artifacts
    reason: Superseded artifacts must not define current data design.
  - path_or_pattern: rejected artifacts or rejected options
    reason: Rejected options must not be revived unless explicitly reopened.
  - path_or_pattern: implementation code, migrations, ORM models, or security-rule files
    reason: Stage 6 is a design stage, not an implementation stage, unless a brownfield review explicitly requires inspection.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters, classify it as blocking or non-blocking, and
      stop if safe progress is impossible.
    missing_stage_input: Proceed only with clearly labeled working assumptions when the gap is non-blocking.
    no_project_context: Do not invent project-specific data design. Produce a blocker report or template-level guidance only.
    conflicting_inputs: Report the conflicting sources and stop if the conflict affects schema, access control, privacy, migration,
      or release feasibility.
    draft_or_unapproved_inputs: Use only if the user explicitly requests draft-based progress; label all outputs as draft
      and list approval risks.
user_directives:
  path: /workflow/06_data/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
  - Do not modify USER_DIRECTIVES.md unless explicitly instructed.
output_contract:
  mandatory_artifacts:
  - path: /workflow/06_data/06_data_design_traceability.md
    purpose: Consolidated Stage 6 traceability.
    required: true
    approval_required: true
    status_values: &id001
    - Draft
    - Approved
    - Needs Review
    required_sections:
    - Traceability Scope
    - Requirement to Data Object Links
    - Acceptance Criteria to Query Pattern Links
    - Domain Concept / Aggregate to Data Object Links
    - Architecture Module / API to Data Object Links
    - Data Object to Security Rule Links
    - Data Object to Migration Item Links
    - Traceability Gaps
    - Traceability Updates Needed in /workflow/context/TRACEABILITY_MATRIX.md
  - path: /workflow/06_data/result.md
    purpose: Final Stage 6 result and approval package.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Task Summary
    - Inputs Used
    - Outputs Created or Updated
    - Approved Decisions Used
    - Key Data Design Findings
    - Decision Candidates
    - Working Assumptions
    - Open Questions
    - Risks and Constraints
    - Rejected or Superseded Options
    - N/A Items
    - Traceability Updates
    - Human Approval Required
    - Recommended Next Step
  - path: /workflow/context/context_packet.md
    purpose: Minimal operational context for Stage 7.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
  conditional_artifacts: []
  n_a_record:
    required: true
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Always update or prepare for the next stage.
    update_rule: Include only the minimum operational context needed by Stage 7.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions exist.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions exist.
    update_rule: Record questions that may affect later stages.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update if options were explicitly rejected or superseded.
    update_rule: Do not revive rejected options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if traceability links are introduced or changed.
    update_rule: Use stable IDs and preserve existing links.
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Prepare minimal context for the next stage or sub-skill.
    next_stage: Stage 7 MVP Scope and Release Slicing
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
traceability:
  id_conventions:
    goals: G-001, G-002
    requirements: REQ-001, REQ-002
    acceptance_criteria: AC-001, AC-002
    domain_concepts: DOM-001, DOM-002
    architecture_components: ARCH-001, ARCH-002
    conceptual_data_objects: DATA-OBJ-001, DATA-OBJ-002
    logical_schema_objects: DSCH-001, DSCH-002
    physical_schema_objects: PHY-001, PHY-002
    query_patterns: QP-001, QP-002
    indexes: IDX-001, IDX-002
    data_security_rules: DSR-001, DSR-002
    retention_rules: RET-001, RET-002
    migration_items: MIG-001, MIG-002
    assumptions: A-001, A-002
    questions: Q-001, Q-002
    risks: R-001, R-002
  required_links:
  - REQ / AC -> DATA-OBJ / DSCH / QP
  - Domain Concept / Aggregate -> DATA-OBJ
  - Architecture Module / API -> DATA-OBJ / QP
  - Data Object -> DSR / RET / MIG where applicable
  prohibited_links:
  - Do not invent upstream requirement, acceptance criteria, domain, architecture, or API IDs.
  - Do not link downstream tasks, tests, or implementation evidence prematurely unless revising after later stages.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
    examples:
    - Approved storage technology, approved schema, approved data security rule direction, approved migration strategy.
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect later work must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  decisions_to_approve:
  - conceptual data model
  - logical schema
  - physical schema if applicable
  - data ownership and source-of-truth boundaries
  - access control and security rule direction
  - retention/deletion policy direction
  - migration and seed strategy
  - N/A classifications for conditional artifacts
  assumptions_to_confirm:
  - working assumptions that affect schema, ownership, access control, retention, deletion, migration, or release slicing
  open_questions_to_resolve:
  - open questions that block safe downstream MVP slicing or implementation planning
  risks_to_review:
  - data loss risk
  - privacy risk
  - security risk
  - migration risk
  - performance risk
  - scope/release risk
  artifacts_ready_for_review:
  - /workflow/06_data/06_conceptual_data_model.md
  - /workflow/06_data/06_logical_schema.md
  - /workflow/06_data/06_query_patterns.md
  - /workflow/06_data/06_data_design_traceability.md
  - /workflow/06_data/result.md
  - /workflow/context/context_packet.md
  - /workflow/06_data/06_physical_schema.md
  - /workflow/06_data/06_indexes.md
  - /workflow/06_data/06_data_security_rules.md
  - /workflow/06_data/06_retention_deletion_policy.md
  - /workflow/06_data/06_migration_plan.md
  - /workflow/06_data/06_data_dictionary.md
  - /workflow/06_data/06_seed_fixture_strategy.md
  - /workflow/06_data/06_external_data_mapping.md
  - /workflow/06_data/06_event_data_model.md
  - /workflow/06_data/06_analytics_reporting_model.md
  - /workflow/06_data/06_blob_object_storage_model.md
validation:
  checklist:
  - All applicable Stage 6 official artifacts exist or have N/A rationale.
  - Contradictions among conceptual, logical, physical, security, retention, and migration artifacts are reported.
  - context_packet.md is prepared for Stage 7 with minimal operational context.
  failure_conditions:
  - required approved input is missing
  - source artifacts conflict
  - security/privacy input is missing for sensitive data
  - authorization model is missing when access control affects data
  - storage decision is missing when physical design is required
  - required output cannot be produced or N/A rationale is missing
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not mark Stage 6 artifacts as approved unless the human developer explicitly approves them.
- Do not hide contradictions among sub-skill outputs.
specialization_hooks:
  allowed: true
  examples:
  - name: web_saas
    may_add:
    - tenant data boundaries
    - role-based access rules
    - PII retention concerns
  - name: internal_tool
    may_add:
    - operator workflows
    - audit requirements
    - organizational data ownership
  - name: mobile_app
    may_add:
    - offline/sync data
    - device permission data
    - local cache retention
  - name: ai_data_product
    may_add:
    - dataset provenance
    - label data
    - evaluation and model output records
  - name: regulated_security_sensitive
    may_add:
    - compliance classifications
    - audit log policy
    - privacy impact constraints
  - name: brownfield_legacy
    may_add:
    - existing schema review
    - migration constraints
    - compatibility requirements
  must_not_change:
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
tool_wrapper_hooks:
  allowed:
  - file_creation_commands
  - save_locations
  - sandbox_rules
  - review_workflow
  - command_invocation_conventions
  must_not_change:
  - stage_reasoning
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
parent_stage:
  name: 06_data_design
  path: /skills/06_data_design
  public_contract: /skills/06_data_design/artifact_contract.yml
subskill:
  id: 06e
  name: 06e_data_design_finalizer
  skill_path: /skills/06_data_design/06e_data_design_finalizer/SKILL.md
  previous_subskill: /skills/06_data_design/06d_security_retention_migration/SKILL.md
  next_subskill: /skills/07_mvp_release_slicing/SKILL.md
  external_visibility: internal
  downstream_dependency_allowed: false
