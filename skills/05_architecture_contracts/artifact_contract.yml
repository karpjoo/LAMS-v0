contract_version: 1.0.0
skill:
  name: 05_architecture_contracts
  stage: 05 Architecture & Technical Contracts
  title: Architecture & Technical Contracts
  skill_path: /skills/05_architecture_contracts/SKILL.md
  readme_path: /skills/05_architecture_contracts/README.md
  primary_output: /workflow/05_architecture/result.md
  requires_human_approval: true
  internal_split: true
purpose:
  summary: Translate approved requirements and domain model outputs into architecture direction, module boundaries, technical contracts, security/privacy architecture, operational policies, and Stage 6 Data Design handoff.
  core_question: Given approved goals, requirements, stakeholder/risk context, and domain model, what architecture and technical contracts should guide data design, testing, task planning, and implementation?
stage_contract:
  public_interface: true
  previous_stage: 04_domain_modeling
  next_stage: 06_data_design
  downstream_depends_on:
  - approved_stage_artifacts
  - /workflow/context/context_packet.md
  downstream_must_not_depend_on:
  - internal_subskill_outputs
  - subskill_folder_names
  - prompt_history
  - agent_chat_history
  - unapproved_drafts
  finalizer_required: true
  finalizer_path: /skills/05_architecture_contracts/05e_architecture_finalizer/SKILL.md
subskills:
  execution_order:
  - id: 05a
    name: architecture_drivers_options
    title: Architecture Drivers & Options
    path: /skills/05_architecture_contracts/05a_architecture_drivers_options/SKILL.md
    primary_output: /workflow/05_architecture/05_architecture_plan.md
  - id: 05b
    name: system_module_boundaries
    title: System & Module Boundaries
    path: /skills/05_architecture_contracts/05b_system_module_boundaries/SKILL.md
    primary_output: /workflow/05_architecture/05_module_boundaries.md
  - id: 05c
    name: technical_contracts
    title: Technical Contracts
    path: /skills/05_architecture_contracts/05c_technical_contracts/SKILL.md
    primary_output: /workflow/05_architecture/05_api_contracts.md
  - id: 05d
    name: auth_security_operations
    title: Auth, Security & Operations
    path: /skills/05_architecture_contracts/05d_auth_security_operations/SKILL.md
    primary_output: /workflow/05_architecture/05_authn_authz_model.md
  - id: 05e
    name: architecture_finalizer
    title: Architecture Finalizer
    path: /skills/05_architecture_contracts/05e_architecture_finalizer/SKILL.md
    primary_output: /workflow/05_architecture/result.md
input_contract:
  always_read:
  - path: /workflow/context/artifact_manifest.yml
    required: true
    purpose: Artifact status, approval, supersession, and source tracking.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/context_packet.md
    required: true
    purpose: Minimal operational context and required inputs for the current stage.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/DECISIONS.md
    required: true
    purpose: Human-approved decisions only.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/ASSUMPTIONS.md
    required: true
    purpose: Working assumptions that must not be treated as approved decisions.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/OPEN_QUESTIONS.md
    required: true
    purpose: Unresolved questions that may affect architecture.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/REJECTED_OPTIONS.md
    required: true
    purpose: Rejected or superseded options that must not be revived without approval.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    required: true
    purpose: Existing traceability links to preserve or improve.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/APPROVAL_LOG.md
    required: true
    purpose: Approval status and history when available.
    source_of_truth: true
    approval_required: false
  - path: /workflow/01_goal/01_service_goal.md
    required: true
    purpose: Approved service goal and success criteria.
    source_of_truth: true
    approval_required: true
  - path: /workflow/02_stakeholders_risk/02_stakeholders.md
    required: true
    purpose: Stakeholders, roles, permission direction, and operational actors.
    source_of_truth: true
    approval_required: true
  - path: /workflow/02_stakeholders_risk/02_risk_privacy_screening.md
    required: true
    purpose: Security, privacy, external transfer, and risk constraints.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_requirements.md
    required: true
    purpose: Functional and non-functional requirements.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_acceptance_criteria.md
    required: true
    purpose: Acceptance criteria and validation expectations.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_traceability_matrix.md
    required: true
    purpose: Requirement-to-acceptance traceability.
    source_of_truth: true
    approval_required: true
  - path: /workflow/04_domain/04_ubiquitous_language.md
    required: true
    purpose: Approved domain terminology.
    source_of_truth: true
    approval_required: true
  - path: /workflow/04_domain/04_domain_model.md
    required: true
    purpose: Approved entities, value objects, aggregates, and domain relationships.
    source_of_truth: true
    approval_required: true
  - path: /workflow/04_domain/04_bounded_contexts.md
    required: true
    purpose: Bounded contexts and context relationships.
    source_of_truth: true
    approval_required: true
  - path: /workflow/04_domain/04_business_rules_invariants.md
    required: true
    purpose: Business rules, invariants, lifecycle, and state-transition implications.
    source_of_truth: true
    approval_required: true
  - path: /workflow/04_domain/04_domain_events.md
    required: true
    purpose: Domain events and event-driven implications.
    source_of_truth: true
    approval_required: true
  read_if_applicable:
  - path: /workflow/00_intake/00_project_intake.md
    condition: Project profile, fixed stack, hosting, platform, or constraints are unclear from context.
    purpose: Project profile and fixed constraints.
  - path: /workflow/00_intake/00_existing_context_review.md
    condition: Project is brownfield, legacy, migration, or existing-system extension work.
    purpose: Existing system constraints and compatibility context.
  - path: /workflow/04_domain/04_domain_traceability_matrix.md
    condition: Stage 4 created a separate domain traceability matrix.
    purpose: Domain-to-requirement links.
  - path: /workflow/04_domain/result.md
    condition: Stage 4 contains architecture-relevant warnings, assumptions, or handoff notes.
    purpose: Stage 4 summary and warnings.
  - path: /workflow_templates/specializations/*.md
    condition: A project-type specialization is selected.
    purpose: Additional project-type rules.
  do_not_read_by_default:
  - path_or_pattern: raw chat history or raw agent logs
    reason: Prompt history is not source of truth.
  - path_or_pattern: unapproved draft artifacts
    reason: Only approved artifacts may be source of truth unless explicitly allowed.
  - path_or_pattern: internal sub-skill outputs from previous stages
    reason: Downstream stages depend on official approved artifacts.
  - path_or_pattern: /workflow/06_data/**
    reason: Detailed data design belongs to Stage 6 and must not drive Stage 5.
  - path_or_pattern: /workflow/09_tasks/** or later
    reason: Task and implementation artifacts are downstream.
  missing_input_handling:
    missing_required_input: Report the missing artifact, explain why it matters, classify as blocking or non-blocking, and stop if architecture safety or traceability is affected.
    missing_stage_input: Record missing Stage 5 artifact as a blocker unless the finalizer is explicitly asked to consolidate partial outputs.
    no_project_context: Do not invent project-specific architecture; request source artifacts or proceed only as exploratory if explicitly instructed.
    conflicting_inputs: Report conflicts and do not silently resolve decisions affecting scope, architecture, data, privacy, security, implementation, or release.
    draft_or_unapproved_inputs: Use only if the human explicitly permits exploratory work; clearly label all outputs as draft.
user_directives:
  path: /workflow/05_architecture/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
  - Do not modify USER_DIRECTIVES.md unless explicitly instructed.
output_contract:
  mandatory_artifacts:
  - path: /workflow/05_architecture/05_architecture_plan.md
    purpose: Overall architecture plan, drivers, context, options, recommended direction, cross-cutting policies, and data/test implications.
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_module_boundaries.md
    purpose: Module/component boundaries, responsibilities, dependencies, public interfaces, and forbidden dependencies.
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_architecture_decisions.md
    purpose: Architecture decision records and decision candidates.
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_architecture_traceability_matrix.md
    purpose: Requirement/domain-to-architecture traceability and gaps.
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/result.md
    purpose: Consolidated Stage 5 result, approval gate, assumptions, open questions, risks, and handoff.
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/context/context_packet.md
    purpose: Minimal operational context for Stage 6 Data Design.
    required: true
    approval_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  conditional_artifacts:
  - path: /workflow/05_architecture/05_api_contracts.md
    condition: System exposes APIs, service operations, RPC, GraphQL, server actions, or programmatic interfaces.
    purpose: Architecture-level API contracts.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_integration_contracts.md
    condition: System communicates with external systems, third-party APIs, identity providers, model services, webhooks, data providers, or external storage.
    purpose: External integration contracts.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_authn_authz_model.md
    condition: User accounts, roles, permissions, administrators, protected resources, or protected operations exist.
    purpose: Architecture-level authentication and authorization model.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_event_contracts.md
    condition: Domain events, async messaging, queues, pub/sub, background jobs, webhooks, notifications, or event-driven workflows exist.
    purpose: Event and async contracts.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_security_privacy_architecture.md
    condition: Personal data, sensitive data, external transfer, LLM/API exposure, compliance concerns, audit needs, or security-sensitive workflows exist.
    purpose: Security and privacy architecture notes.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_operational_architecture.md
    condition: Deployment, hosting, scaling, reliability, observability, environment management, secrets, or operations are significant architecture concerns.
    purpose: Operational architecture and cross-cutting policies.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  - path: /workflow/05_architecture/05_brownfield_compatibility_plan.md
    condition: Project modifies, extends, migrates, or integrates with an existing system.
    purpose: Brownfield compatibility and migration boundary plan.
    n_a_record_required: true
    status_values:
    - Draft
    - Approved
    - Needs Review
  n_a_record:
    required: true
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Always update or prepare for Stage 6 in the finalizer.
    update_rule: Include only the minimum operational context needed by Stage 6 Data Design.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions exist.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions exist.
    update_rule: Record questions that may affect later stages.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update if options were explicitly rejected or superseded.
    update_rule: Do not revive rejected options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if traceability links are introduced or changed.
    update_rule: Use stable IDs and preserve existing links.
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Prepare minimal context for Stage 6 Data Design.
    next_stage: 06_data_design
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
traceability:
  id_conventions:
    architecture_components: ARC-001, ARC-002
    modules: MOD-001, MOD-002
    api_contracts: API-001, API-002
    integration_contracts: INT-001, INT-002
    auth_rules: AUTHZ-001, AUTHZ-002
    event_contracts: EVT-001, EVT-002
    architecture_decisions: ADR-001, ADR-002
    architecture_risks: ARISK-001, ARISK-002
    architecture_questions: AQ-001, AQ-002
  required_links:
  - Requirement → Acceptance Criteria → Domain Concept / Invariant / Event → Architecture Component / Module → API / Integration / Event Contract → Data Design Implication → Test Strategy Implication
  prohibited_links:
  - Do not create task, implementation, or test evidence links prematurely.
  - Do not link downstream stages to internal sub-skill folders.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
  decision_candidate:
    rule: Architecture recommendations awaiting approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect data design, tests, implementation, security, or release must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  decisions_to_approve:
  - Architecture style and direction
  - Major technical choices
  - Frontend/backend/service boundary
  - Module boundaries
  - API contracts if applicable
  - Integration contracts if applicable
  - Authentication and authorization model if applicable
  - Event/async contracts if applicable
  - Security/privacy architecture if applicable
  - Operational architecture if applicable
  assumptions_to_confirm:
  - Technology stack assumptions
  - Deployment/hosting assumptions
  - Integration availability assumptions
  - Performance/scalability assumptions
  - Auth provider assumptions
  - Data ownership assumptions
  - Observability/logging assumptions
  open_questions_to_resolve:
  - Questions affecting Stage 6 Data Design
  - Contract questions affecting Stage 8 Test Strategy
  - Security/privacy questions affecting implementation safety
  - Operational questions affecting deployment or release
  risks_to_review:
  - Architecture complexity risk
  - Security/privacy risk
  - Data consistency risk
  - Integration reliability risk
  - Vendor lock-in risk
  - Maintainability risk
  - Testability risk
  artifacts_ready_for_review:
  - /workflow/05_architecture/05_architecture_plan.md
  - /workflow/05_architecture/05_module_boundaries.md
  - /workflow/05_architecture/05_architecture_decisions.md
  - /workflow/05_architecture/05_architecture_traceability_matrix.md
  - /workflow/05_architecture/result.md
  - /workflow/context/context_packet.md
  - /workflow/05_architecture/05_api_contracts.md
  - /workflow/05_architecture/05_integration_contracts.md
  - /workflow/05_architecture/05_authn_authz_model.md
  - /workflow/05_architecture/05_event_contracts.md
  - /workflow/05_architecture/05_security_privacy_architecture.md
  - /workflow/05_architecture/05_operational_architecture.md
  - /workflow/05_architecture/05_brownfield_compatibility_plan.md
validation:
  checklist:
  - Parent SKILL.md acts as stage entrypoint/orchestrator.
  - Sub-skill execution order is clear.
  - Mandatory artifacts match Stage 5 SKILL.md.
  - Conditional artifacts include N/A rules.
  - Finalizer requirement is explicit.
  - Downstream Stage 6 depends only on approved official artifacts.
  - No project-specific content is introduced.
  - No /workflow project artifacts are created by this support-file contract.
  failure_conditions:
  - Required source artifacts are missing or unapproved.
  - Architecture artifacts contradict each other.
  - Required conditional artifact is missing without N/A rationale.
  - Human approval is required but absent.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not execute the SKILL while creating support files.
- Do not create project artifacts under /workflow while creating support files.
- Do not change SKILL.md unless explicitly instructed.
- Do not treat agent proposals as approved decisions.
- Do not make downstream stages depend on sub-skill internals.
- Do not skip the finalizer.
specialization_hooks:
  allowed: true
  examples:
  - name: web_saas
    may_add:
    - tenant/account boundary
    - identity provider integration
    - API versioning
    - rate limiting
    - audit logging
  - name: internal_tool
    may_add:
    - operator workflow boundaries
    - admin permissions
    - organizational data access rules
    - audit or approval workflow
  - name: mobile_app
    may_add:
    - offline/sync architecture
    - device permission boundaries
    - local storage boundary
    - push notification contracts
  - name: ai_data_product
    may_add:
    - dataset ingestion boundary
    - model service boundary
    - inference/evaluation contract
    - human review workflow
    - model output risk controls
  - name: regulated_security_sensitive
    may_add:
    - threat model interface
    - audit trail architecture
    - data minimization architecture
    - privacy impact constraints
    - stronger approval logging
  - name: brownfield_legacy
    may_add:
    - existing architecture review
    - migration strategy boundary
    - compatibility constraints
    - adapter/strangler considerations
    - rollback architecture
  must_not_change:
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
tool_wrapper_hooks:
  allowed:
  - file_creation_commands
  - save_locations
  - sandbox_rules
  - review_workflow
  - command_invocation_conventions
  must_not_change:
  - stage_reasoning
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
