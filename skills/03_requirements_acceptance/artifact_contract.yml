contract_version: "1.0.0"

skill:
  name: "03_requirement_acceptance"
  aliases:
    - "03_requirements_acceptance"
  stage: "03 Requirements & Acceptance Criteria"
  title: "Requirement Acceptance"
  skill_path: "/skills/03_requirement_acceptance/SKILL.md"
  readme_path: "/skills/03_requirement_acceptance/README.md"
  primary_output: "/workflow/03_requirements/03_requirements.md"
  stage_result_output: "/workflow/03_requirements/result.md"
  requires_human_approval: true
  internal_split: false

purpose:
  summary: "Convert approved goals, stakeholder context, and risk/privacy framing into testable requirements, acceptance criteria, traceability, and Stage 4 handoff context."
  core_question: "What must the system do, for whom, under which constraints, and how will each requirement be verified?"

stage_relationship:
  previous_stage: "02 Stakeholder & Risk Framing"
  next_stage: "04 Domain Modeling / DDD"
  downstream_dependency_rule: "Downstream stages may depend only on approved official Stage 3 artifacts, not prompt history or internal sub-skill outputs."

input_contract:
  always_read:
    - path: "/workflow/context/artifact_manifest.yml"
      required: true
      purpose: "Check artifact existence, approval status, supersession, and source relationships."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/context_packet.md"
      required: true
      purpose: "Read minimal operational context and required input hints from prior stages."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/DECISIONS.md"
      required: true
      purpose: "Read human-approved decisions only."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/ASSUMPTIONS.md"
      required: true
      purpose: "Read active working assumptions and keep them separate from requirements."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/OPEN_QUESTIONS.md"
      required: true
      purpose: "Read unresolved questions that may affect requirements."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/REJECTED_OPTIONS.md"
      required: true
      purpose: "Avoid reviving rejected or superseded options."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/TRACEABILITY_MATRIX.md"
      required: true
      purpose: "Preserve existing traceability links and IDs."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/APPROVAL_LOG.md"
      required: true
      purpose: "Verify explicit human approvals where available."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/01_goal/01_service_goal.md"
      required: true
      purpose: "Use approved service goals, success criteria, non-goals, and open questions as requirement sources."
      source_of_truth: true
      approval_required: true
    - path: "/workflow/02_stakeholders_risk/02_stakeholders.md"
      required: true
      purpose: "Use stakeholder roles, actors, permissions, and user needs as requirement sources."
      source_of_truth: true
      approval_required: true
    - path: "/workflow/02_stakeholders_risk/02_risk_privacy_screening.md"
      required: true
      purpose: "Use risk, privacy, security, data, and compliance findings as requirement constraints."
      source_of_truth: true
      approval_required: true

  read_if_applicable:
    - path: "/workflow/00_intake/00_project_intake.md"
      condition: "Project profile, fixed stack, delivery constraints, or project type affect requirements."
      purpose: "Reflect project type and fixed constraints in requirement boundaries."
    - path: "/workflow/00_intake/00_existing_context_review.md"
      condition: "Brownfield, migration, extension, or existing-system constraints exist."
      purpose: "Capture backward compatibility, migration, regression, and forbidden-change constraints."
    - path: "/workflow/01_goal/review_notes.md"
      condition: "Stage 1 human review comments exist."
      purpose: "Apply human review corrections or unresolved questions from the service goal stage."
    - path: "/workflow/02_stakeholders_risk/review_notes.md"
      condition: "Stage 2 human review comments exist."
      purpose: "Apply human review corrections or unresolved questions from stakeholder/risk framing."
    - path: "/workflow/03_requirements/USER_DIRECTIVES.md"
      condition: "Stage-local human instructions exist."
      purpose: "Apply current stage instructions before agent assumptions."
    - path: "/workflow_templates/specializations/*.md"
      condition: "A project-type specialization is active."
      purpose: "Add specialization-specific requirement checks without replacing Stage 3 rules."
    - path: "/workflow/03_requirements/*.md"
      condition: "Stage 3 is being revised."
      purpose: "Preserve existing requirement IDs, supersession history, and prior review notes."

  do_not_read_by_default:
    - path_or_pattern: "raw chat history"
      reason: "Prompt history is not an approved source of truth."
    - path_or_pattern: "raw agent logs"
      reason: "Logs are not official project artifacts."
    - path_or_pattern: "superseded drafts"
      reason: "Superseded drafts must not be used as current truth."
    - path_or_pattern: "rejected artifacts as current truth"
      reason: "Rejected artifacts may only be referenced as rejected history."
    - path_or_pattern: "unrelated previous-stage drafts"
      reason: "Avoid accidental scope expansion or stale context."
    - path_or_pattern: "implementation code"
      reason: "Stage 3 defines requirements and must not derive requirements from implementation details by default."
    - path_or_pattern: "later-stage artifacts"
      reason: "Avoid retrofitting requirements from downstream design unless explicitly revising Stage 3."

  missing_input_handling:
    missing_required_input: "Record the missing input in result.md, explain why it matters, classify it as Blocking or Non-blocking, and continue only with explicit working assumptions when safe."
    missing_stage_input: "If the service goal, stakeholder context, or risk/privacy screening is missing or unapproved, stop unless the user explicitly requests exploratory drafting."
    no_project_context: "Create a blocker report instead of inventing project-specific requirements."
    conflicting_inputs: "Report conflicting sources, identify impact, apply input precedence, and stop if the conflict affects scope, roles, security, privacy, data, compliance, or must-have goals."
    draft_or_unapproved_inputs: "Use only as draft context if the user explicitly permits it; mark all derived outputs as Draft or Needs Review."

user_directives:
  path: "/workflow/03_requirements/USER_DIRECTIVES.md"
  required_if_exists: true
  handling_rules:
    - "Read before executing the SKILL."
    - "Classify directives as approval, correction, preference, new requirement candidate, rejection, scope change, constraint, question, or additional input."
    - "Do not treat every directive as a globally approved decision."
    - "Report conflicts with approved decisions."
    - "Do not modify USER_DIRECTIVES.md unless explicitly instructed."

output_contract:
  mandatory_artifacts:
    - path: "/workflow/03_requirements/03_requirements.md"
      purpose: "Official Stage 3 requirements artifact."
      required: true
      approval_required: true
      status_values:
        - "Draft"
        - "Proposed"
        - "Approved"
        - "Needs Clarification"
        - "Needs Review"
      required_sections:
        - "Document Status"
        - "Source Context Summary"
        - "Requirement Classification Summary"
        - "Functional Requirements"
        - "Non-Functional Requirements"
        - "Security / Privacy / Data Requirements"
        - "Operational / Integration Requirements"
        - "Scope Boundary Candidates"
        - "Requirements Needing Clarification"
        - "Requirements Not Yet Testable"
    - path: "/workflow/03_requirements/03_acceptance_criteria.md"
      purpose: "Official Stage 3 acceptance criteria artifact."
      required: true
      approval_required: true
      status_values:
        - "Draft"
        - "Proposed"
        - "Approved"
        - "Needs Clarification"
        - "Needs Review"
      required_sections:
        - "Document Status"
        - "Acceptance Criteria Summary"
        - "Criteria by Requirement"
        - "Cross-Cutting Acceptance Criteria"
        - "Manual Review Criteria"
        - "Criteria Needing Clarification"
    - path: "/workflow/03_requirements/03_traceability_matrix.md"
      purpose: "Official Stage 3 requirement-level traceability artifact."
      required: true
      approval_required: true
      status_values:
        - "Draft"
        - "Approved"
        - "Needs Review"
      required_sections:
        - "Document Status"
        - "Traceability Matrix"
        - "IDs Introduced in This Stage"
        - "Traceability Gaps"
        - "Do Not Trace Yet"
    - path: "/workflow/03_requirements/result.md"
      purpose: "Stage execution summary, blocker report if needed, review items, and human approval gate."
      required: true
      approval_required: true
      status_values:
        - "Draft"
        - "Approved"
        - "Needs Review"
      required_sections:
        - "Task Summary"
        - "Inputs Used"
        - "Outputs Created or Updated"
        - "Missing / Conflicting Information"
        - "Requirement Summary"
        - "Acceptance Criteria Summary"
        - "Scope Boundary Candidates"
        - "Requirements Not Yet Testable"
        - "Decision Candidates"
        - "Working Assumptions"
        - "Open Questions"
        - "Risks and Constraints"
        - "Rejected or Superseded Requirement Candidates"
        - "Traceability Updates"
        - "Conditional Artifacts N/A Record"
        - "Split Assessment"
        - "Human Approval Required"
        - "Recommended Next Step"
    - path: "/workflow/context/context_packet.md"
      purpose: "Minimal operational context for Stage 4 Domain Modeling / DDD."
      required: true
      approval_required: false
      status_values:
        - "Draft"
        - "Approved"
        - "Needs Review"
      required_sections:
        - "Current Project State"
        - "Approved Decisions"
        - "Working Assumptions"
        - "Open Questions"
        - "Rejected / Superseded Options"
        - "Constraints That Must Not Be Violated"
        - "Key Context for Next Stage"
        - "Required Inputs for Next Stage"
        - "Do Not Do"

  conditional_artifacts:
    - path: "/workflow/03_requirements/03_nfr_requirements.md"
      condition: "NFRs are too large for 03_requirements.md."
      purpose: "Separate reviewable non-functional requirements."
      n_a_record_required: true
    - path: "/workflow/03_requirements/03_security_privacy_requirements.md"
      condition: "Security, privacy, or data requirements require separate review."
      purpose: "Separate security/privacy/data requirement review."
      n_a_record_required: true
    - path: "/workflow/03_requirements/03_scenarios_edge_cases.md"
      condition: "Scenarios and edge cases are substantial."
      purpose: "Separate detailed scenarios, negative paths, and edge cases."
      n_a_record_required: true
    - path: "/workflow/03_requirements/03_scope_candidates.md"
      condition: "Scope classification needs separate tracking before Stage 7."
      purpose: "Track Must, Should, Could, Won't, Later, and Needs Human Decision candidates."
      n_a_record_required: true
    - path: "/workflow/03_requirements/03_requirements_open_questions.md"
      condition: "Many requirements are blocked by unresolved questions."
      purpose: "Track requirement-specific open questions separately."
      n_a_record_required: true

  n_a_record:
    required: true
    location: "/workflow/03_requirements/result.md"
    required_fields:
      - "artifact"
      - "why_not_applicable"
      - "revisit_if"

context_updates:
  files_to_update:
    - path: "/workflow/context/context_packet.md"
      condition: "Always update or prepare for Stage 4."
      update_rule: "Include only the minimum operational context needed by Stage 4 Domain Modeling / DDD."
    - path: "/workflow/context/ASSUMPTIONS.md"
      condition: "Update if Stage 3 working assumptions exist."
      update_rule: "Record assumptions without treating them as decisions or requirements."
    - path: "/workflow/context/OPEN_QUESTIONS.md"
      condition: "Update if unresolved requirement questions exist."
      update_rule: "Record questions that may affect domain concepts, rules, roles, permissions, scope, lifecycle, invariants, validation, or security/privacy."
    - path: "/workflow/context/REJECTED_OPTIONS.md"
      condition: "Update if requirement or scope options were explicitly rejected or superseded."
      update_rule: "Do not revive rejected options unless explicitly reopened."
    - path: "/workflow/context/TRACEABILITY_MATRIX.md"
      condition: "Update if project-level traceability is maintained."
      update_rule: "Use stable IDs and preserve existing links."
    - path: "/workflow/context/DECISIONS.md"
      condition: "Only update if explicit human approval exists."
      update_rule: "Do not record agent-generated requirements, recommendations, or assumptions as approved decisions."

  context_packet:
    path: "/workflow/context/context_packet.md"
    purpose: "Prepare minimal context for Stage 4 Domain Modeling / DDD."
    next_stage: "04 Domain Modeling / DDD"
    required_sections:
      - "Current Project State"
      - "Approved Decisions"
      - "Working Assumptions"
      - "Open Questions"
      - "Rejected / Superseded Options"
      - "Constraints That Must Not Be Violated"
      - "Key Context for Next Stage"
      - "Required Inputs for Next Stage"
      - "Do Not Do"
    required_inputs_for_next_stage:
      - "/workflow/03_requirements/03_requirements.md"
      - "/workflow/03_requirements/03_acceptance_criteria.md"
      - "/workflow/03_requirements/03_traceability_matrix.md"
      - "/workflow/01_goal/01_service_goal.md"
      - "/workflow/02_stakeholders_risk/02_stakeholders.md"
      - "/workflow/02_stakeholders_risk/02_risk_privacy_screening.md"
      - "/workflow/context/DECISIONS.md"
      - "/workflow/context/ASSUMPTIONS.md"
      - "/workflow/context/OPEN_QUESTIONS.md"
      - "/workflow/context/REJECTED_OPTIONS.md"
    do_not_do_for_next_stage:
      - "Do not treat draft requirements as approved."
      - "Do not design database tables before domain modeling."
      - "Do not convert assumptions into domain rules."
      - "Do not ignore security/privacy requirements."
      - "Do not make Stage 4 depend on Stage 3 prompt history."

traceability:
  id_conventions:
    functional_requirements: "FR-001, FR-002"
    non_functional_requirements: "NFR-001, NFR-002"
    security_privacy_requirements: "SEC-001, SEC-002"
    data_requirements: "DATA-001, DATA-002"
    operational_requirements: "OPS-001, OPS-002"
    integration_requirements: "INT-001, INT-002"
    acceptance_criteria: "AC-FR-001-01, AC-NFR-001-01"
    open_questions: "OQ-REQ-001, OQ-REQ-002"
    assumptions: "ASM-REQ-001, ASM-REQ-002"
    risks: "RISK-001, RISK-002"
    roles: "ROLE-001, ROLE-002"
  required_links:
    - "Service Goal -> Requirement"
    - "Success Criterion -> Requirement"
    - "Stakeholder / Role -> Requirement"
    - "Risk / Privacy Concern -> Requirement, if applicable"
    - "Requirement -> Acceptance Criterion"
    - "Requirement -> NFR, if applicable"
    - "Requirement / Acceptance Criterion -> Validation Method"
    - "Requirement -> Open Question, if unresolved"
    - "Requirement -> Rejected / Non-Scope Item, if excluded"
  prohibited_links:
    - "Requirement -> Domain Entity, unless revising Stage 3 after Stage 4 exists and the user explicitly requests it"
    - "Requirement -> API Endpoint, unless revising Stage 3 after Stage 5 exists and the user explicitly requests it"
    - "Requirement -> Database Table, unless revising Stage 3 after Stage 6 exists and the user explicitly requests it"
    - "Requirement -> Implementation Task, unless revising Stage 3 after Stage 9 exists and the user explicitly requests it"
    - "Requirement -> Test File, unless revising Stage 3 after tests exist and the user explicitly requests it"
    - "Requirement -> Code Module, unless revising Stage 3 after implementation exists and the user explicitly requests it"

classification_rules:
  approved_decision:
    rule: "Only explicit human approval can create an approved decision."
    examples:
      - "Approved: FR-001 through FR-006 are approved as must-have requirements."
  decision_candidate:
    rule: "Agent recommendations awaiting human approval must be marked as decision candidates."
    examples:
      - "Candidate: Treat account deletion as must-have because Stage 2 identified personal data retention risk."
  working_assumption:
    rule: "Temporary beliefs needed for progress must remain assumptions until confirmed."
    examples:
      - "Assumption: The MVP has one administrative role unless Stage 2 says otherwise."
  open_question:
    rule: "Unresolved issues that may affect requirements or later work must be recorded as open questions."
    examples:
      - "Open Question: Should external reviewers be able to edit submitted evaluations after final submission?"
  rejected_option:
    rule: "Explicitly rejected or superseded options must be recorded and not revived unless reopened."
    examples:
      - "Rejected: Public self-registration is out of scope for the MVP unless reopened by the human developer."
  recommendation:
    rule: "Recommendations are not decisions and must not be recorded as approved."

approval_gate:
  required: true
  decisions_to_approve:
    - "Functional requirements"
    - "Non-functional requirements"
    - "Security/privacy/data requirements"
    - "Operational/integration requirements"
    - "Acceptance criteria"
    - "Non-scope and boundary items"
    - "Stage 3 split decision, if execution was unreliable or too large"
  assumptions_to_confirm:
    - "Requirement assumptions affecting Stage 4 domain concepts, rules, roles, permissions, scope, lifecycle, invariants, validation, or security/privacy"
  open_questions_to_resolve:
    - "Questions that block testable requirements or Stage 4 domain modeling"
  risks_to_review:
    - "Security/privacy/data risks reflected in requirements"
    - "Requirements not yet testable"
    - "Scope expansion risk"
    - "Traceability gaps"
  artifacts_ready_for_review:
    - "/workflow/03_requirements/03_requirements.md"
    - "/workflow/03_requirements/03_acceptance_criteria.md"
    - "/workflow/03_requirements/03_traceability_matrix.md"
    - "/workflow/03_requirements/result.md"

validation:
  checklist:
    - "Required sources were read or missing inputs were reported."
    - "USER_DIRECTIVES.md was checked if present."
    - "Each approved service goal is covered or explicitly out of scope."
    - "Each primary stakeholder role is represented or has N/A rationale."
    - "Stage 2 risk/privacy findings are reflected in requirements, constraints, or open questions."
    - "Each requirement has acceptance criteria or a documented testability gap."
    - "Acceptance criteria are observable and testable."
    - "NFRs use measurable targets or review criteria where possible."
    - "Requirements avoid architecture, schema, UI, or implementation design."
    - "Security/privacy/data requirements are not silently deferred."
    - "Non-goals and rejected options are preserved."
    - "IDs are stable."
    - "Traceability links are updated."
    - "Assumptions and open questions are separated from requirements."
    - "DECISIONS.md was not updated without explicit human approval."
    - "context_packet.md is prepared for Stage 4."
    - "Human approval gate is present."
    - "Split assessment is recorded in result.md."
  failure_conditions:
    - "No approved or review-ready service goal exists."
    - "Target users, roles, or stakeholders are missing."
    - "Scope boundaries or non-goals are missing."
    - "Risk/privacy/security context is missing for personal, sensitive, regulated, privileged, or externally transferred data."
    - "USER_DIRECTIVES.md conflicts with approved decisions."
    - "Required source artifact is superseded or rejected."
    - "Requirements cannot be made testable without human decision."
  blocker_report_required: true
  blocker_report_fields:
    - "blocking_issue"
    - "why_it_matters"
    - "affected_artifacts_or_stages"
    - "safe_partial_work_completed"
    - "human_decision_needed"

split_policy:
  default: "single_skill"
  split_only_if: "Execution becomes too large or unreliable."
  parent_stage_package: "/skills/03_requirement_acceptance"
  official_artifacts_remain_stable: true
  optional_subskills:
    - id: "03a"
      name: "requirement_source_review"
      path: "/skills/03_requirement_acceptance/03a_requirement_source_review/SKILL.md"
      responsibility: "Read approved Stage 1-2 inputs, summarize source context, extract requirement candidates, and identify missing/conflicting inputs."
    - id: "03b"
      name: "requirement_decomposition"
      path: "/skills/03_requirement_acceptance/03b_requirement_decomposition/SKILL.md"
      responsibility: "Create or update 03_requirements.md and preserve requirement IDs, categories, scope boundaries, and non-goals."
    - id: "03c"
      name: "acceptance_criteria_writer"
      path: "/skills/03_requirement_acceptance/03c_acceptance_criteria_writer/SKILL.md"
      responsibility: "Create or update 03_acceptance_criteria.md with observable criteria and testability gaps."
    - id: "03d"
      name: "requirements_traceability_finalizer"
      path: "/skills/03_requirement_acceptance/03d_requirements_traceability_finalizer/SKILL.md"
      responsibility: "Create or update 03_traceability_matrix.md, consolidate official artifacts, update result.md and context_packet.md, and prepare approval gate."
  downstream_must_not_depend_on:
    - "internal_subskill_outputs"
    - "subskill_folder_names"
    - "prompt_history"

prohibited_actions:
  - "Treat agent-generated requirements as approved."
  - "Invent requirements without source rationale."
  - "Convert assumptions into requirements."
  - "Silently expand scope."
  - "Ignore non-goals or rejected options."
  - "Ignore security/privacy risk context."
  - "Design database schema, APIs, UI, architecture, or implementation tasks."
  - "Create implementation prompts."
  - "Write code or tests."
  - "Use downstream stage artifacts as source of truth by default."
  - "Update DECISIONS.md without explicit human approval."
  - "Use context_packet.md as the only source of truth."
  - "Make downstream stages depend on internal sub-skill structure."
  - "Claim Stage 3 is complete without human review."

specialization_hooks:
  allowed: true
  examples:
    - name: "web_saas"
      may_add:
        - "account lifecycle requirements"
        - "authentication and authorization requirements"
        - "tenant or organization boundary requirements"
        - "admin operation requirements"
        - "audit log requirements"
        - "API, rate limit, and abuse handling requirements"
    - name: "internal_tool"
      may_add:
        - "operator workflow requirements"
        - "approval and review responsibility requirements"
        - "organizational constraint requirements"
        - "admin override requirements"
        - "manual correction path requirements"
    - name: "mobile_app"
      may_add:
        - "device permission requirements"
        - "offline/sync requirements"
        - "push notification requirements"
        - "platform constraint requirements"
        - "local storage privacy requirements"
    - name: "ai_data_product"
      may_add:
        - "dataset provenance requirements"
        - "label trust and labeling policy requirements"
        - "model output review requirements"
        - "evaluation metric requirements"
        - "human review and reproducibility requirements"
        - "model failure mode and bias/error analysis requirements"
    - name: "regulated_security_sensitive"
      may_add:
        - "auditability requirements"
        - "access control granularity requirements"
        - "retention/deletion requirements"
        - "privacy impact requirements"
        - "compliance question tracking"
        - "approval workflow and release blocker requirements"
    - name: "brownfield_legacy"
      may_add:
        - "backward compatibility requirements"
        - "migration constraint requirements"
        - "regression-sensitive flow requirements"
        - "behavior preservation requirements"
        - "forbidden change area requirements"
  must_not_change:
    - "approval_rules"
    - "artifact_contract"
    - "assumption_handling"
    - "traceability_rules"
    - "stage_boundaries"

  must_not_replace:
    - "Stage 3 rules"
    - "Human approval gate"
    - "Official Stage 3 artifacts"

tool_wrapper_hooks:
  allowed:
    - "file_creation_commands"
    - "save_locations"
    - "sandbox_rules"
    - "review_workflow"
    - "command_invocation_conventions"
  must_not_change:
    - "stage_reasoning"
    - "approval_rules"
    - "artifact_contract"
    - "assumption_handling"
    - "traceability_rules"
    - "stage_boundaries"
