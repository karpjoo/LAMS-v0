contract_version: 1.0.0
skill:
  name: 12_review_release_handoff
  stage: 12 Review / Security / Release / Handoff
  title: Review / Security / Release / Handoff
  skill_path: /skills/12_review_release_handoff/SKILL.md
  readme_path: /skills/12_review_release_handoff/README.md
  primary_output: /workflow/12_review_release_handoff/result.md
  requires_human_approval: true
  internal_split: true
purpose:
  summary: Perform final review, security/privacy review, release readiness, deployment planning, operations preparation,
    and documentation handoff.
  core_question: Is the implemented system ready for human-approved release, deployment, operation, and handoff based on approved
    requirements, implementation evidence, validation evidence, security/privacy constraints, and operational readiness?
stage_contract:
  public_interface: true
  downstream_depends_on:
  - approved_stage_artifacts
  downstream_must_not_depend_on:
  - internal_subskill_outputs
  - subskill_folder_names
  - prompt_history
  - agent_scratchpads
  - unapproved_draft_outputs
  previous_stage: 11_tdd_implementation_loop
  next_stage: 13_workflow_retrospective_skill_improvement
  finalizer_required: true
subskills:
  execution_order:
  - id: 12a
    name: 12a_code_review
    path: /skills/12_review_release_handoff/12a_code_review/SKILL.md
    primary_output: /workflow/12_review_release_handoff/12_code_review.md
  - id: 12b
    name: 12b_security_privacy_review
    path: /skills/12_review_release_handoff/12b_security_privacy_review/SKILL.md
    primary_output: /workflow/12_review_release_handoff/12_security_privacy_review.md
  - id: 12c
    name: 12c_release_deployment_readiness
    path: /skills/12_review_release_handoff/12c_release_deployment_readiness/SKILL.md
    primary_output: /workflow/12_review_release_handoff/12_release_readiness.md
  - id: 12d
    name: 12d_operations_documentation_handoff
    path: /skills/12_review_release_handoff/12d_operations_documentation_handoff/SKILL.md
    primary_output: /workflow/12_review_release_handoff/12_documentation_handoff.md
  - id: 12e
    name: 12e_review_release_finalizer
    path: /skills/12_review_release_handoff/12e_review_release_finalizer/SKILL.md
    primary_output: /workflow/12_review_release_handoff/result.md
input_contract:
  always_read:
  - path: /workflow/context/artifact_manifest.yml
    required: true
    purpose: Artifact status, approval state, supersession, and source-of-truth checks.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/context_packet.md
    required: true
    purpose: Minimal operational context from the previous stage.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/DECISIONS.md
    required: true
    purpose: Human-approved decisions only.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/ASSUMPTIONS.md
    required: false
    purpose: Active working assumptions.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/OPEN_QUESTIONS.md
    required: false
    purpose: Unresolved questions affecting release review.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/REJECTED_OPTIONS.md
    required: false
    purpose: Options that must not be revived unless reopened.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    required: false
    purpose: Traceability across goals, requirements, tests, tasks, and evidence.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/APPROVAL_LOG.md
    required: false
    purpose: Human approval records.
    source_of_truth: true
    approval_required: true
  - path: /workflow/01_goal/01_service_goal.md
    required: true
    purpose: Approved service goal for release-purpose alignment.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_requirements.md
    required: true
    purpose: Approved requirements to verify release satisfaction.
    source_of_truth: true
    approval_required: true
  - path: /workflow/03_requirements/03_acceptance_criteria.md
    required: true
    purpose: Approved acceptance criteria for validation review.
    source_of_truth: true
    approval_required: true
  - path: /workflow/07_mvp_release/07_mvp_scope.md
    required: true
    purpose: Approved MVP/release scope.
    source_of_truth: true
    approval_required: true
  - path: /workflow/07_mvp_release/07_release_slices.md
    required: false
    purpose: Approved release slicing and sequence.
    source_of_truth: true
    approval_required: true
  - path: /workflow/08_test_strategy/08_test_strategy.md
    required: true
    purpose: Approved validation strategy.
    source_of_truth: true
    approval_required: true
  - path: /workflow/08_test_strategy/08_validation_commands.md
    required: true
    purpose: Validation command expectations and evidence baseline.
    source_of_truth: true
    approval_required: true
  - path: /workflow/09_tasks/09_task_cards.md
    required: true
    purpose: Task cards implemented during Stage 11.
    source_of_truth: true
    approval_required: true
  - path: /workflow/09_tasks/09_traceability_matrix.md
    required: false
    purpose: Task-level traceability source.
    source_of_truth: true
    approval_required: true
  - path: /workflow/11_implementation_results/
    required: true
    purpose: Task results and test evidence from implementation.
    source_of_truth: true
    approval_required: true
  read_if_applicable:
  - path: /workflow/00_intake/00_existing_context_review.md
    condition: Project is brownfield, extension, migration, or compatibility-sensitive.
    purpose: Existing system constraints and regression risks.
  - path: /workflow/02_stakeholders_risk/02_risk_privacy_screening.md
    condition: Roles, personal data, sensitive data, regulatory concerns, external transfer, or abuse risks exist.
    purpose: Security/privacy and stakeholder risk baseline.
  - path: /workflow/04_domain/04_business_rules_invariants.md
    condition: Domain invariants, lifecycle rules, or state transitions affect correctness or release risk.
    purpose: Business-rule and invariant verification.
  - path: /workflow/05_architecture/05_architecture_plan.md
    condition: Architecture affects deployment, runtime, integration, security, or rollback.
    purpose: Architecture constraints for review.
  - path: /workflow/05_architecture/05_api_contracts.md
    condition: APIs exist.
    purpose: API contract review.
  - path: /workflow/05_architecture/05_integration_contracts.md
    condition: External integrations exist.
    purpose: Integration readiness and failure-mode review.
  - path: /workflow/06_data/06_logical_schema.md
    condition: Persistent data exists.
    purpose: Data correctness and release risk review.
  - path: /workflow/06_data/06_migration_plan.md
    condition: Schema or data migration is part of release.
    purpose: Migration readiness review.
  - path: /workflow/06_data/06_data_security_rules.md
    condition: Data access rules are security-relevant.
    purpose: Data-level security review.
  do_not_read_by_default:
  - path_or_pattern: raw chat history
    reason: Not a stable source of truth.
  - path_or_pattern: raw agent scratchpads
    reason: May contain unapproved reasoning or stale assumptions.
  - path_or_pattern: superseded artifacts
    reason: Must not be treated as current truth.
  - path_or_pattern: rejected artifacts
    reason: Must not be revived unless explicitly reopened.
  - path_or_pattern: production secrets or secret values
    reason: Secret values must not be exposed or copied.
  - path_or_pattern: unrelated historical drafts
    reason: Avoid context pollution and stale assumptions.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters for release review, mark it blocking or non-blocking,
      and produce a blocker report if blocking.
    missing_stage_input: Continue only with clearly labeled assumptions when safe; otherwise stop and request human decision.
    no_project_context: Do not invent project facts. Produce a preflight blocker report.
    conflicting_inputs: Report the conflicting sources and do not silently resolve conflicts that affect release, security,
      privacy, deployment, or handoff.
    draft_or_unapproved_inputs: Use only as draft context unless the user explicitly requests exploratory review.
user_directives:
  path: /workflow/12_review_release_handoff/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
output_contract:
  mandatory_artifacts:
  - path: /workflow/12_review_release_handoff/12_code_review.md
    purpose: Official code review artifact.
    required: true
    approval_required: true
    status_values: &id001
    - Draft
    - Approved
    - Needs Review
    required_sections: &id002
    - Task Summary
    - Inputs Used
    - Outputs Created or Updated
    - Release Candidate Reviewed
    - Overall Release Readiness Status
    - Blockers
    - Warnings
    - Suggestions
    - Security / Privacy Findings Summary
    - Deployment / Operations Findings Summary
    - Documentation Findings Summary
    - Decision Candidates
    - Working Assumptions
    - Open Questions
    - N/A Records
    - Traceability Updates
    - Human Approval Required
  - path: /workflow/12_review_release_handoff/12_security_privacy_review.md
    purpose: Official security and privacy review artifact.
    required: true
    approval_required: true
    status_values: *id001
    required_sections: *id002
  - path: /workflow/12_review_release_handoff/12_release_readiness.md
    purpose: Official release readiness artifact.
    required: true
    approval_required: true
    status_values: *id001
    required_sections: *id002
  - path: /workflow/12_review_release_handoff/12_documentation_handoff.md
    purpose: Official documentation handoff artifact.
    required: true
    approval_required: true
    status_values: *id001
    required_sections: *id002
  - path: /workflow/12_review_release_handoff/result.md
    purpose: Consolidated Stage 12 result and approval gate.
    required: true
    approval_required: true
    status_values: *id001
    required_sections: *id002
  - path: /workflow/context/context_packet.md
    purpose: Context handoff prepared for Stage 13.
    required: true
    approval_required: true
    status_values: *id001
    required_sections: *id002
  conditional_artifacts:
  - path: /workflow/12_review_release_handoff/12_deployment_plan.md
    condition: Deployment, hosting, environment promotion, or release execution is in scope.
    purpose: Deployment, hosting, environment promotion, or release execution is in scope.
    n_a_record_required: true
  - path: /workflow/12_review_release_handoff/12_operations_runbook.md
    condition: Operation, monitoring, support, maintenance, or handoff is in scope.
    purpose: Operation, monitoring, support, maintenance, or handoff is in scope.
    n_a_record_required: true
  - path: /workflow/12_review_release_handoff/12_release_notes.md
    condition: A versioned release, client handoff, internal MVP release, or production handoff is planned.
    purpose: A versioned release, client handoff, internal MVP release, or production handoff is planned.
    n_a_record_required: true
  - path: /workflow/12_review_release_handoff/12_migration_readiness.md
    condition: Data, schema, identity, storage, or external-system migration is required.
    purpose: Data, schema, identity, storage, or external-system migration is required.
    n_a_record_required: true
  - path: /workflow/12_review_release_handoff/12_incident_rollback_plan.md
    condition: Rollback, recovery, or incident response requires separate detail.
    purpose: Rollback, recovery, or incident response requires separate detail.
    n_a_record_required: true
  - path: /workflow/12_review_release_handoff/12_compliance_review.md
    condition: Regulated, audit-sensitive, privacy-sensitive, or compliance-sensitive constraints require separate treatment.
    purpose: Regulated, audit-sensitive, privacy-sensitive, or compliance-sensitive constraints require separate treatment.
    n_a_record_required: true
  n_a_record:
    required: true
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Always update or prepare for the next stage or next sub-SKILL.
    update_rule: Include only the minimum operational context needed by the next stage or sub-SKILL.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions exist.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions exist.
    update_rule: Record questions that may affect release, deployment, operations, handoff, or retrospective.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update if options were explicitly rejected or superseded.
    update_rule: Do not revive rejected options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if traceability links are introduced or changed.
    update_rule: Use stable IDs and preserve existing links.
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Prepare minimal context for the next stage or sub-SKILL.
    next_stage: 13_workflow_retrospective_skill_improvement
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
traceability:
  id_conventions:
    review_findings: REV-001, REV-002
    security_findings: SEC-001, SEC-002
    privacy_findings: PRIV-001, PRIV-002
    release_findings: REL-001, REL-002
    operations_findings: OPS-001, OPS-002
    documentation_findings: DOC-001, DOC-002
  required_links:
  - Goal → Requirement → Acceptance Criteria → Release Scope → Task → Implementation Evidence → Test Evidence → Review Finding
    → Release Decision
  prohibited_links:
  - Do not link downstream Stage 13 decisions directly to internal sub-SKILL outputs as source of truth.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
    examples:
    - Release as internal-only candidate with warning REL-001.
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect later work must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  decisions_to_approve:
  - Release readiness status
  - Release decision
  - Deployment decision
  - Migration decision if applicable
  - Rollback/recovery readiness
  - Accepted limitations
  - Security/privacy risk acceptance
  - Operations ownership
  - Documentation handoff
  assumptions_to_confirm:
  - Release target assumptions
  - Deployment or environment assumptions
  - Security/privacy assumptions
  - Operations ownership assumptions
  open_questions_to_resolve:
  - Questions affecting release, deployment, operations, or handoff
  risks_to_review:
  - Release blockers
  - Security/privacy warnings
  - Operational risks
  - Documentation gaps
  artifacts_ready_for_review:
  - /workflow/12_review_release_handoff/12_code_review.md
  - /workflow/12_review_release_handoff/12_security_privacy_review.md
  - /workflow/12_review_release_handoff/12_release_readiness.md
  - /workflow/12_review_release_handoff/12_documentation_handoff.md
  - /workflow/12_review_release_handoff/result.md
  - /workflow/context/context_packet.md
  - /workflow/12_review_release_handoff/12_deployment_plan.md
  - /workflow/12_review_release_handoff/12_operations_runbook.md
  - /workflow/12_review_release_handoff/12_release_notes.md
  - /workflow/12_review_release_handoff/12_migration_readiness.md
  - /workflow/12_review_release_handoff/12_incident_rollback_plan.md
  - /workflow/12_review_release_handoff/12_compliance_review.md
validation:
  checklist:
  - Approved release scope is identified.
  - Implementation evidence is reviewed.
  - Test/validation evidence is reviewed.
  - Security and privacy constraints are reviewed.
  - Deployment and rollback readiness are reviewed if applicable.
  - Operations and documentation handoff are reviewed.
  - Blockers, warnings, and suggestions are separated.
  - Finalizer prepared context_packet.md for Stage 13.
  failure_conditions:
  - No approved release scope.
  - No implementation evidence.
  - No test evidence.
  - Security/privacy-sensitive system without review inputs.
  - Deployment requested but deployment environment unknown.
  - Migration required but migration plan missing.
  - Conflicting approved decisions.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not approve release on behalf of the human developer.
- Do not deploy without explicit human approval.
- Do not treat missing evidence as passing evidence.
- Do not expose or copy secret values.
- Do not perform implementation or refactoring unless explicitly instructed.
- Do not create Stage 13 retrospective artifacts.
specialization_hooks:
  allowed: true
  examples:
  - name: web_saas
    may_add:
    - hosting readiness
    - auth callback domain review
    - CORS/API exposure review
    - production environment review
  - name: internal_tool
    may_add:
    - operator documentation
    - access provisioning
    - audit expectations
    - organizational owner handoff
  - name: mobile_app
    may_add:
    - app store release checklist
    - device permission review
    - offline/sync behavior review
    - crash reporting
  - name: ai_data_product
    may_add:
    - model output risk review
    - dataset provenance review
    - evaluation evidence review
    - human review requirements
  - name: regulated_security_sensitive
    may_add:
    - compliance constraints
    - privacy impact review
    - audit log review
    - stronger release blockers
  - name: brownfield_legacy
    may_add:
    - regression risk review
    - backward compatibility review
    - migration safety review
    - legacy integration review
  must_not_change:
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
tool_wrapper_hooks:
  allowed:
  - file_creation_commands
  - save_locations
  - sandbox_rules
  - review_workflow
  - command_invocation_conventions
  - artifact_validation_commands
  must_not_change:
  - stage_reasoning
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
