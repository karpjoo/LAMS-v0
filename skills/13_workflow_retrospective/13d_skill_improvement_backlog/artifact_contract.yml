contract_version: 1.0.0
skill:
  name: 13d_skill_improvement_backlog
  stage: 13 Workflow Retrospective & Skill Improvement
  title: Skill Improvement Backlog
  skill_path: /skills/13_workflow_retrospective/13d_skill_improvement_backlog/SKILL.md
  readme_path: /skills/13_workflow_retrospective/13d_skill_improvement_backlog/README.md
  primary_output: /workflow/13_retrospective/13_skill_improvement_backlog.md
  requires_human_approval: true
  external_visibility: internal
parent_stage:
  name: 13_workflow_retrospective
  path: /skills/13_workflow_retrospective
  public_contract: /skills/13_workflow_retrospective/artifact_contract.yml
  downstream_stage_dependency_allowed: false
subskill:
  id: 13d
  name: 13d_skill_improvement_backlog
  order: 4
  previous_subskill: /skills/13_workflow_retrospective/13c_agent_failure_pattern_analysis/SKILL.md
  next_subskill: /skills/13_workflow_retrospective/13e_retrospective_finalizer/SKILL.md
  external_visibility: internal
  downstream_dependency_allowed: false
purpose:
  summary: Converts evidence-backed retrospective findings and Agent behavior patterns into reusable lessons, prioritized
    skill improvement backlog items, and skill lifecycle recommendations.
  core_question: Which evidence-backed lessons should become reusable workflow rules, SKILL revisions, new skills, split/merge
    candidates, or future experiments?
input_contract:
  always_read:
  - path: /workflow/context/artifact_manifest.yml
    required: false
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/context_packet.md
    required: true
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/APPROVAL_LOG.md
    required: false
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/DECISIONS.md
    required: true
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/ASSUMPTIONS.md
    required: true
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/OPEN_QUESTIONS.md
    required: true
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/REJECTED_OPTIONS.md
    required: true
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    required: true
    purpose: Workflow context and source-of-truth status.
    source_of_truth: true
    approval_required: false
  - path: /workflow/13_retrospective/USER_DIRECTIVES.md
    required: false
    purpose: Stage-local human instructions.
    source_of_truth: false
    approval_required: false
  - path: /workflow/13_retrospective/13_agent_failure_patterns.md
    required: true
    purpose: Previous sub-SKILL output needed for continuity.
    source_of_truth: false
    approval_required: false
  read_if_applicable:
  - path: /workflow/00_intake/result.md
    condition: The retrospective covers Stage 0 or full-workflow execution.
    purpose: Stage 0 execution evidence.
  - path: /workflow/01_goal/result.md through /workflow/12_review_release_handoff/result.md
    condition: The retrospective covers the full workflow or needs stage-by-stage analysis.
    purpose: Stage result summaries for workflow-level evidence.
  - path: /workflow/*/review_notes.md
    condition: Human review notes exist.
    purpose: Human corrections, approvals, rejections, and review comments.
  - path: /workflow/11_implementation_results/11_task_result_*.md
    condition: Implementation behavior or TDD loop quality is in scope.
    purpose: Task execution evidence.
  - path: /workflow/11_implementation_results/11_test_evidence_*.md
    condition: Test evidence or validation discipline is in scope.
    purpose: Validation evidence.
  - path: agent_session_logs/*
    condition: Explicitly provided by the user and safe to inspect.
    purpose: Optional raw Agent behavior evidence.
  - path: ci_reports/*
    condition: CI behavior, validation stability, or release evidence is in scope.
    purpose: Optional validation and automation evidence.
  do_not_read_by_default:
  - path_or_pattern: raw source code files
    reason: Stage 13 reviews workflow quality, not implementation internals, unless code evidence is explicitly needed.
  - path_or_pattern: secrets, credentials, private keys, or environment files
    reason: Unsafe and unnecessary for retrospective support-file execution.
  - path_or_pattern: full raw Agent chat logs
    reason: Too noisy and privacy-sensitive unless explicitly provided and needed.
  - path_or_pattern: superseded or rejected artifacts
    reason: Use only when drift, rejection, or supersession behavior is explicitly in scope.
  - path_or_pattern: unrelated project documentation
    reason: Avoid widening retrospective scope beyond workflow evidence.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters, and mark it blocking or non-blocking.
    missing_stage_input: Continue only if the retrospective scope can be narrowed safely; otherwise produce a blocker report.
    no_project_context: Classify the work as a skill-template or workflow-design retrospective rather than a project retrospective.
    conflicting_inputs: Report conflicts and do not silently choose one source when approval, scope, evidence, or workflow
      changes are affected.
    draft_or_unapproved_inputs: Use as evidence only if clearly labeled Draft or Needs Review; do not treat as approved source
      of truth.
user_directives:
  path: /workflow/13_retrospective/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the SKILL.
  - Classify directives as approval, correction, retrospective focus area, skill improvement request, workflow policy preference,
    rejection, scope limitation, question, or additional evidence source.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
  - Do not modify USER_DIRECTIVES.md unless explicitly instructed.
output_contract:
  mandatory_artifacts:
  - path: /workflow/13_retrospective/13_skill_improvement_backlog.md
    purpose: Prioritized backlog of reusable skill, template, artifact, context, approval, and validation improvements.
    required: true
    approval_required: true
    status_values: &id001
    - Draft
    - Approved
    - Needs Review
    required_sections:
    - Backlog Summary
    - Priority Definitions
    - Backlog Items
    - Detailed Backlog Items
    - Skill Lifecycle Recommendations
  - path: /workflow/13_retrospective/13_reusable_lessons.md
    purpose: Reusable workflow lessons that may inform future projects and skill revisions.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Reusable Workflow Rules
    - Reusable Prompt / SKILL Design Rules
    - Reusable Artifact Contract Lessons
    - Reusable Context Management Lessons
    - Reusable Approval Gate Lessons
    - Reusable Testing / Validation Lessons
    - Reusable DDD / Domain Lessons
    - Reusable Security / Privacy Lessons
    - Project-Specific Lessons Not Yet Generalized
    - Tool-Specific Lessons
  conditional_artifacts:
  - path: /workflow/13_retrospective/13_skill_split_candidates.md
    condition: One or more SKILLs appear too large, mixed in responsibility, or unstable during execution.
    purpose: Candidate SKILL split, merge, delete, or facade-pattern recommendations.
    n_a_record_required: true
  - path: /workflow/13_retrospective/13_next_workflow_experiment_plan.md
    condition: The retrospective identifies changes that should be tested in a later project or workflow experiment.
    purpose: Plan for validating workflow or SKILL changes before broad reuse.
    n_a_record_required: true
  n_a_record:
    required: true
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
  official_stage_artifact_updates:
  - /workflow/13_retrospective/13_skill_improvement_backlog.md
  - /workflow/13_retrospective/13_reusable_lessons.md
  finalizer_required_for_stage_approval: true
local_handoff:
  next_subskill: /skills/13_workflow_retrospective/13e_retrospective_finalizer/SKILL.md
  handoff_rule: Prepare concise handoff notes for the next sub-SKILL. Do not mark outputs as approved official Stage 13 artifacts.
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Always update or prepare for the next action.
    update_rule: Include only the minimum operational context needed by the next skill revision work, workflow experiment,
      or next project intake.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions exist.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions exist.
    update_rule: Record questions that may affect later workflow improvement work.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update if options were explicitly rejected or superseded.
    update_rule: Do not revive rejected workflow or SKILL options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if retrospective findings, lessons, or backlog items introduce traceability links.
    update_rule: Use stable IDs and preserve existing links.
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Prepare minimal context for the next workflow improvement action.
    next_stage: /skills/13_workflow_retrospective/13e_retrospective_finalizer/SKILL.md
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Action
    - Required Inputs for Next Action
    - Do Not Do
traceability:
  id_conventions:
    findings: RF-001, RF-002
    failure_patterns: AFP-001, AFP-002
    reusable_lessons: RL-001, RL-002
    improvement_items: SIB-001, SIB-002
    assumptions: A-001, A-002
    questions: Q-001, Q-002
    risks: R-001, R-002
  required_links:
  - Evidence Source → Retrospective Finding
  - Retrospective Finding → Agent Failure Pattern or Reusable Lesson
  - Agent Failure Pattern or Reusable Lesson → Skill Improvement Backlog Item
  prohibited_links:
  - Do not link unapproved suggestions as approved SKILL revisions.
  - Do not make downstream workflow stages depend on internal sub-skill outputs.
  - Do not treat one-off anecdotes as repeated failure patterns unless clearly labeled.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved workflow or SKILL decision.
    examples:
    - 'Approved: Revise Stage 10 implementation prompt SKILL to require explicit forbidden-change scope.'
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect later workflow or SKILL work must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded workflow or SKILL options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not approved workflow changes and must not be recorded as approved decisions.
approval_gate:
  required: true
  decisions_to_approve:
  - Skill improvement priorities
  - Skill split, merge, delete, or creation candidates
  - Reusable lessons to promote into future templates
  assumptions_to_confirm:
  - Any assumptions used because evidence was incomplete or draft.
  open_questions_to_resolve:
  - Any unresolved question that affects later Stage 13 consolidation or skill improvement planning.
  risks_to_review:
  - Evidence overreach
  - Confusing recommendation with approved decision
  - Depending on internal sub-skill output downstream
  artifacts_ready_for_review:
  - /workflow/13_retrospective/13_skill_improvement_backlog.md
  - /workflow/13_retrospective/13_reusable_lessons.md
validation:
  checklist:
  - Each backlog item links to a finding, failure pattern, lesson, or evidence source.
  - Backlog items distinguish preserve/fix/split/merge/remove/create/experiment.
  - Recommendations are not recorded as approved revisions without human approval.
  failure_conditions:
  - Findings are too weak to justify reusable SKILL changes.
  - Backlog items cannot be traced to evidence or retrospective findings.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not revise reusable SKILL.md files directly.
- Do not create new skills without approval; create backlog items instead.
- Do not bypass the Stage 13 finalizer.
- Do not update DECISIONS.md without explicit human approval.
specialization_hooks:
  allowed: true
  examples:
  - name: web_saas
    may_add:
    - release-readiness retrospective questions
    - auth/privacy workflow evidence
    - deployment and operations lessons
  - name: internal_tool
    may_add:
    - operator workflow questions
    - organizational approval lessons
    - manual process integration findings
  - name: mobile_app
    may_add:
    - platform release lessons
    - device permission workflow findings
    - offline/sync validation lessons
  - name: ai_data_product
    may_add:
    - data provenance workflow findings
    - evaluation-metric lessons
    - human review and model-output risk lessons
  - name: regulated_security_sensitive
    may_add:
    - compliance review lessons
    - privacy-sensitive workflow findings
    - audit and risk approval lessons
  - name: brownfield_legacy
    may_add:
    - migration workflow findings
    - compatibility review lessons
    - regression baseline lessons
  must_not_change:
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
tool_wrapper_hooks:
  allowed:
  - file_creation_commands
  - save_locations
  - sandbox_rules
  - review_workflow
  - command_invocation_conventions
  must_not_change:
  - stage_reasoning
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
