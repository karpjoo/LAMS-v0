  do_not_read_by_default:
  - path_or_pattern: raw agent chat history
    reason: Prompt history is not a stable source of truth.
  - path_or_pattern: superseded artifacts
    reason: Superseded artifacts must not drive current task decisions.
  - path_or_pattern: rejected artifacts or rejected options
    reason: Rejected options must not be revived without explicit human instruction.
  - path_or_pattern: unrelated previous stage drafts
    reason: Avoid context bloat and accidental use of unapproved drafts.
  - path_or_pattern: implementation source files
    reason: Stage 9 normally plans tasks before implementation; read code only when brownfield context requires it.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters, classify as blocking or non-blocking, and stop
      if task decomposition would be unsafe.
    missing_stage_input: Record the gap in result or local output and continue only with explicit working assumptions when
      safe.
    no_project_context: Stop and request project context or approved prior-stage artifacts.
    conflicting_inputs: Report the conflict, identify sources, explain impact, and do not silently resolve scope, architecture,
      data, security, or validation conflicts.
    draft_or_unapproved_inputs: Use only when explicitly allowed; mark outputs as draft and require human review.
user_directives:
  path: /workflow/09_tasks/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the sub-SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
output_contract:
  mandatory_artifacts:
  - path: /workflow/09_tasks/09_task_source_map.md
    purpose: Output artifact for this sub-skill.
    required: true
    approval_required: false
    status_values:
    - Draft
    - Approved
    - Needs Review
    required_sections:
    - Source Inputs Used
    - Active Scope Basis
    - Requirement Source Map
    - Architecture / Module Source Map
    - Domain / Business Rule Source Map
    - Data / Migration Source Map
    - Validation Source Map
    - Candidate Task Areas
    - Coverage Gaps
    - Blocking Questions
    - Handoff Notes for 09b
  conditional_artifacts: []
  n_a_record:
    required: false
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
    - source_basis
context_updates:
  files_to_update:
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions may affect later Stage 9 sub-skills or Stage 10.
    update_rule: Record questions without resolving them silently.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions are needed by later sub-skills.
    update_rule: Record assumptions without treating them as decisions.
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Only the finalizer prepares final Stage 10 handoff. Earlier sub-skills record local handoff notes.
    next_stage: 09_task_breakdown internal next sub-skill
    required_sections:
    - Local Handoff Notes
    - Open Questions
    - Working Assumptions
    - Do Not Do
traceability:
  id_conventions:
    requirements: REQ-001, REQ-002
    tasks: TASK-001, TASK-002
    assumptions: A-001, A-002
    questions: Q-001, Q-002
    risks: R-001, R-002
  required_links:
  - Requirement → Acceptance Criteria → Release Slice → Task
  - Requirement → Acceptance Criteria → Test / Validation Method → Task
  - Domain Rule / Invariant → Required Test → Task, if applicable
  - Architecture Component / API Contract → Task, if applicable
  - Data Artifact / Security Rule → Task, if applicable
  - Task → Future Implementation Prompt Placeholder
  - Task → Future Implementation Evidence Placeholder
  prohibited_links:
  - Out-of-scope item → Task
  - Rejected option → Task
  - Unapproved draft requirement → Task as if approved
  - Internal sub-skill output → Downstream source of truth
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
    examples:
    - Approved task inventory
    - Approved task dependency order
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect later work must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  decisions_to_approve:
  - Task inventory
  - Task card set
  - Task dependency order
  - Task sizing and split decisions
  - Enabling tasks
  - Risk-reduction spikes
  - Deferred tasks
  - Definition of done for each task
  - Stage 10 prompt writing order
  assumptions_to_confirm:
  - Task boundary assumptions
  - Implementation order assumptions
  - Missing input workarounds
  - Inferred file or module ownership
  - Inferred validation methods
  open_questions_to_resolve:
  - Requirements without clear implementation path
  - Tasks blocked by architecture, data, or test ambiguity
  - Tasks requiring human scope judgment
  - Tasks requiring technology or library confirmation
  risks_to_review:
  - Large or cross-cutting tasks
  - Security/privacy-sensitive tasks
  - Migration-sensitive tasks
  - Integration-sensitive tasks
  - Tasks with unclear rollback
  - Tasks with weak validation evidence
  artifacts_ready_for_review:
  - /workflow/09_tasks/09_task_source_map.md
validation:
  checklist:
  - Required approved inputs were checked.
  - Missing or draft inputs were reported.
  - Out-of-scope items were not converted into tasks.
  - Every must-have requirement has at least one task or a recorded coverage gap.
  - Every task has a stable task ID.
  - Every task has required tests or manual validation.
  - Every task has definition of done.
  - Task order respects dependencies.
  - Traceability matrix has been updated.
  - Human approval gate is explicit.
  failure_conditions:
  - Approved requirements are missing.
  - Approved MVP or release scope is missing.
  - Stage 8 validation strategy is missing.
  - Task decomposition would require scope expansion.
  - Task IDs are inconsistent across Stage 9 artifacts.
  - Stage 10 handoff cannot be prepared safely.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- create final task cards
- assign final implementation order
- write implementation prompts
- implement code
- treat candidate task areas as approved tasks
- Update DECISIONS.md without explicit human approval.
- Treat internal sub-skill output as downstream source of truth.
