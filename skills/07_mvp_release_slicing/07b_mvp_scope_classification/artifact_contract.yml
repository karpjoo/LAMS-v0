  read_if_applicable:
  - path: /workflow/02_stakeholders_risk/02_stakeholders.md
    condition: Stakeholder or actor priority affects MVP scope.
    purpose: Use role and stakeholder priority when classifying MVP scope.
  - path: /workflow/02_stakeholders_risk/02_risk_privacy_screening.md
    condition: Security, privacy, compliance, personal data, sensitive data, external API, or LLM transfer concerns affect release order.
    purpose: Identify non-deferrable safety and compliance scope.
  - path: /workflow/04_domain/04_ubiquitous_language.md
    condition: Scope item names or release slice names require terminology alignment.
    purpose: Keep scope language consistent with the domain language.
  - path: /workflow/04_domain/04_bounded_contexts.md
    condition: Release slices may cross bounded contexts.
    purpose: Avoid unsafe cross-context release boundaries.
  - path: /workflow/04_domain/04_domain_events.md
