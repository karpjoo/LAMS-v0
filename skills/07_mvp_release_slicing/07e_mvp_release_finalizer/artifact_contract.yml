contract_version: 1.0.0
skill:
  name: 07e_mvp_release_finalizer
  stage: 07 MVP Scope & Release Slicing
  title: MVP Release Finalizer
  skill_path: /skills/07_mvp_release_slicing/07e_mvp_release_finalizer/SKILL.md
  readme_path: /skills/07_mvp_release_slicing/07e_mvp_release_finalizer/README.md
  primary_output: /workflow/07_mvp_release/result.md
  requires_human_approval: true
  external_visibility: internal
