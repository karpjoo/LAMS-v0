purpose:
  summary: Consolidate official Stage 7 artifacts, detect contradictions, update traceability and context handoff, and prepare the human approval gate.
  core_question: Are the Stage 7 artifacts consistent, traceable, approval-ready, and sufficient for Stage 8 validation planning?
