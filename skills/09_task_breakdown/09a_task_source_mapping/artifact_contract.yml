purpose:
  summary: Create an internal source map that identifies where implementation tasks should come from. This sub-skill prepares
    a structured mapping from approved inputs to candidate task areas; it does not create final task cards.
  core_question: What must this sub-skill produce so Stage 9 can create approved, ordered, traceable implementation tasks?
