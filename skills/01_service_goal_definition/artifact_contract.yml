contract_version: "1.0.0"

skill:
  name: "service_goal_definition"
  stage: "01_service_goal_definition"
  title: "Service Goal Definition"
  skill_path: "/skills/01_service_goal_definition/SKILL.md"
  readme_path: "/skills/01_service_goal_definition/README.md"
  contract_path: "/skills/01_service_goal_definition/artifact_contract.yml"
  primary_output: "/workflow/01_goal/01_service_goal.md"
  result_output: "/workflow/01_goal/result.md"
  requires_human_approval: true

purpose:
  summary: "Define why the service should exist before deciding what to build."
  core_question: "Why should this service exist, for whom, what value should it provide, and how will we know at a high level that the goal is being achieved?"

stage_position:
  previous_stage: "00_project_intake"
  next_stage: "02_stakeholder_risk_framing"
  receives_from_previous_stage:
    - "project type"
    - "initial context"
    - "fixed constraints"
    - "existing documents"
    - "forbidden change areas"
    - "approved or draft intake findings"
  prepares_for_next_stage:
    - "service goal summary"
    - "target users"
    - "core value"
    - "success criteria"
    - "non-goals"
    - "assumptions"
    - "open questions"
    - "risks and ambiguities relevant to stakeholder and risk framing"

input_contract:
  always_read:
    - path: "/workflow/context/artifact_manifest.yml"
      required: false
      purpose: "Check artifact existence, status, approval, supersession, and source relationships."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/context_packet.md"
      required: false
      purpose: "Read minimal operational context from the previous stage."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/DECISIONS.md"
      required: false
      purpose: "Read human-approved decisions only."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/ASSUMPTIONS.md"
      required: false
      purpose: "Read active working assumptions."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/OPEN_QUESTIONS.md"
      required: false
      purpose: "Read unresolved questions affecting later work."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/REJECTED_OPTIONS.md"
      required: false
      purpose: "Avoid reviving rejected or superseded options."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/context/TRACEABILITY_MATRIX.md"
      required: false
      purpose: "Preserve existing traceability and add goal-level links when applicable."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/context/APPROVAL_LOG.md"
      required: false
      purpose: "Verify explicit human approvals."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/00_intake/00_project_intake.md"
      required: false
      purpose: "Read Stage 0 project intake context."
      source_of_truth: true
      approval_required: false
    - path: "/workflow/00_intake/result.md"
      required: false
      purpose: "Read Stage 0 execution summary and handoff notes."
      source_of_truth: false
      approval_required: false
    - path: "/workflow/01_goal/USER_DIRECTIVES.md"
      required: false
      purpose: "Read Stage 1 local human directives before execution."
      source_of_truth: false
      approval_required: false

  read_if_applicable:
    - path: "/workflow/00_intake/00_existing_context_review.md"
      condition: "Project is brownfield, migration, modernization, extension, maintenance, or existing-system work."
      purpose: "Use existing system context without redoing intake."
    - path: "/workflow/00_intake/review_notes.md"
      condition: "Stage 0 human review comments exist."
      purpose: "Apply human review comments from intake."
    - path: "/workflow/01_goal/review_notes.md"
      condition: "Revising Stage 1 after human review."
      purpose: "Use prior Stage 1 review comments."
    - path: "project brief / initial idea / product memo / research plan / business memo / problem statement"
      condition: "Referenced by Stage 0, context files, or USER_DIRECTIVES.md."
      purpose: "Use source material for problem and goal definition."
    - path: "/workflow_templates/specializations/*.md"
      condition: "A project profile activates a specialization addendum."
      purpose: "Apply project-type additions without replacing this contract."
    - path: "/workflow_templates/tool_wrappers/*.md"
      condition: "The execution environment requires tool-specific wrapper guidance."
      purpose: "Apply execution-environment conventions without changing stage logic."

  do_not_read_by_default:
    - path_or_pattern: "/workflow/02_stakeholders_risk/**"
      reason: "Stage 1 must not perform or depend on downstream stakeholder/risk analysis."
    - path_or_pattern: "/workflow/03_requirements/**"
      reason: "Stage 1 must not create or depend on requirements or acceptance criteria."
    - path_or_pattern: "/workflow/04_domain/**"
      reason: "Stage 1 must not perform domain modeling."
    - path_or_pattern: "/workflow/05_architecture/**"
      reason: "Stage 1 must not perform architecture design."
    - path_or_pattern: "/workflow/06_data/**"
      reason: "Stage 1 must not perform data design."
    - path_or_pattern: "/workflow/08_test_strategy/**"
      reason: "Stage 1 must not create test strategy."
    - path_or_pattern: "/workflow/09_tasks/**"
      reason: "Stage 1 must not create implementation tasks."
    - path_or_pattern: "source code or full codebase"
      reason: "Stage 1 is not an implementation or code inspection stage."
    - path_or_pattern: "raw agent logs"
      reason: "Raw logs are not source-of-truth artifacts."
    - path_or_pattern: "superseded or rejected drafts"
      reason: "Rejected or superseded sources must not be revived."

  missing_input_handling:
    missing_required_input: "Report the missing input, explain why it matters, classify it as blocking or non-blocking, and continue only with explicit working assumptions when safe."
    missing_stage_input: "If Stage 0 is missing, report it as a potential blocker and continue only if enough user-provided idea, directive, or project context exists."
    no_project_context: "If no service idea, no Stage 0 artifact, and no user directive exist, do not invent a service goal; produce a blocker report only."
    conflicting_inputs: "Report conflicts explicitly and stop if they affect service goal, primary users, success criteria, non-goals, or major scope boundaries."
    draft_or_unapproved_inputs: "Use draft inputs only as draft context and mark dependent outputs as Draft or Needs Review."

user_directives:
  path: "/workflow/01_goal/USER_DIRECTIVES.md"
  required_if_exists: true
  handling_rules:
    - "Read before executing the SKILL."
    - "Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input."
    - "Apply directives before Agent assumptions."
    - "Do not treat every directive as a globally approved decision."
    - "Report conflicts with approved decisions."
    - "Do not modify USER_DIRECTIVES.md unless explicitly instructed."

output_contract:
  mandatory_artifacts:
    - path: "/workflow/01_goal/01_service_goal.md"
      purpose: "Primary Stage 1 service goal artifact."
      required: true
      approval_required: true
      status_values:
        - Draft
        - Approved
        - Needs Review
      required_sections:
        - "Status"
        - "Problem Definition"
        - "Target Users"
        - "Core Value Proposition"
        - "Desired Outcomes"
        - "Success Criteria"
        - "Non-Goals"
        - "Initial Scope Boundary"
        - "Initial Assumptions"
        - "Open Questions"
        - "Risks and Ambiguities"
        - "Goal-Level Traceability"
        - "Human Approval Required"

    - path: "/workflow/01_goal/result.md"
      purpose: "Stage 1 execution summary, findings, decisions to approve, assumptions, questions, risks, and next step."
      required: true
      approval_required: false
      status_values:
        - Draft
        - Needs Review
      required_sections:
        - "Task Summary"
        - "Inputs Used"
        - "Outputs Created or Updated"
        - "Key Findings"
        - "Decision Candidates"
        - "Working Assumptions"
        - "Open Questions"
        - "Risks and Constraints"
        - "Rejected or Superseded Options"
        - "Traceability Updates"
        - "Human Approval Required"
        - "Recommended Next Step"

    - path: "/workflow/context/context_packet.md"
      purpose: "Minimal operational context prepared for Stage 2."
      required: true
      approval_required: false
      status_values:
        - Draft
        - Updated
      required_sections:
        - "Current Project State"
        - "Approved Decisions"
        - "Working Assumptions"
        - "Open Questions"
        - "Rejected / Superseded Options"
        - "Constraints That Must Not Be Violated"
        - "Key Context for Stage 2"
        - "Required Inputs for Stage 2"
        - "Do Not Do"

  conditional_artifacts:
    - path: "/workflow/01_goal/01_goal_options.md"
      condition: "Multiple plausible service goal directions exist."
      purpose: "Compare service goal candidates and recommend one only as a decision candidate."
      n_a_record_required: true
    - path: "/workflow/01_goal/01_success_metrics.md"
      condition: "Success criteria require separate elaboration."
      purpose: "Clarify high-level success metrics without creating acceptance criteria."
      n_a_record_required: true
    - path: "/workflow/01_goal/01_non_goals.md"
      condition: "Non-goals are complex, contentious, or central to scope control."
      purpose: "Document excluded, deferred, rejected, or superseded goal directions."
      n_a_record_required: true
    - path: "/workflow/01_goal/review_notes.md"
      condition: "Human review comments are summarized during revision."
      purpose: "Preserve review comments relevant to Stage 1 revision."
      n_a_record_required: true

  n_a_record:
    required: true
    required_fields:
      - artifact
      - why_not_applicable
      - revisit_if

context_updates:
  files_to_update:
    - path: "/workflow/context/context_packet.md"
      condition: "Always update or prepare for Stage 2."
      update_rule: "Include only the minimum operational context needed by Stage 2."
    - path: "/workflow/context/ASSUMPTIONS.md"
      condition: "Update if working assumptions exist."
      update_rule: "Record assumptions without treating them as decisions."
    - path: "/workflow/context/OPEN_QUESTIONS.md"
      condition: "Update if unresolved questions exist."
      update_rule: "Record questions that may affect later stages."
    - path: "/workflow/context/REJECTED_OPTIONS.md"
      condition: "Update if options were explicitly rejected or superseded."
      update_rule: "Do not revive rejected options unless explicitly reopened."
    - path: "/workflow/context/TRACEABILITY_MATRIX.md"
      condition: "Update if goal-level traceability links are introduced or changed."
      update_rule: "Use stable IDs and preserve existing links."
    - path: "/workflow/context/DECISIONS.md"
      condition: "Update only if explicit human approval exists."
      update_rule: "Record only human-approved decisions."

  context_packet:
    path: "/workflow/context/context_packet.md"
    purpose: "Prepare minimal context for Stage 2 Stakeholder & Risk Framing."
    next_stage: "02_stakeholder_risk_framing"
    required_sections:
      - "Current Project State"
      - "Approved Decisions"
      - "Working Assumptions"
      - "Open Questions"
      - "Rejected / Superseded Options"
      - "Constraints That Must Not Be Violated"
      - "Key Context for Stage 2"
      - "Required Inputs for Stage 2"
      - "Do Not Do"
    required_inputs_for_next_stage:
      - "/workflow/01_goal/01_service_goal.md"
      - "/workflow/01_goal/result.md"
      - "/workflow/context/context_packet.md"
      - "/workflow/context/DECISIONS.md"
      - "/workflow/context/ASSUMPTIONS.md"
      - "/workflow/context/OPEN_QUESTIONS.md"
      - "/workflow/context/REJECTED_OPTIONS.md"
      - "/workflow/context/TRACEABILITY_MATRIX.md"

traceability:
  id_conventions:
    goals: "G-001, G-002"
    assumptions: "A-001, A-002"
    questions: "Q-001, Q-002"
    risks: "R-001, R-002"
    requirements: "REQ-001, REQ-002"
    tasks: "TASK-001, TASK-002"
  required_links:
    - "Goal -> Problem"
    - "Goal -> Target Users"
    - "Goal -> Core Value"
    - "Goal -> Success Criteria"
    - "Goal -> Assumptions"
    - "Goal -> Open Questions"
  prohibited_links:
    - "Do not create Goal -> Requirement links unless approved upstream constraints already exist."
    - "Do not create acceptance criteria links."
    - "Do not create domain, architecture, data, test, task, or implementation evidence links."

classification_rules:
  approved_decision:
    rule: "Only explicit human approval can create an approved decision."
    examples:
      - "The human developer explicitly approves the service goal."
      - "The human developer explicitly approves primary users, success criteria, non-goals, or scope boundaries."
  decision_candidate:
    rule: "Agent recommendations awaiting human approval must be marked as decision candidates."
  working_assumption:
    rule: "Temporary beliefs needed for progress must remain assumptions until confirmed."
  open_question:
    rule: "Unresolved issues that may affect later work must be recorded as open questions."
  rejected_option:
    rule: "Explicitly rejected or superseded options must be recorded and not revived unless reopened."
  recommendation:
    rule: "Recommendations are not decisions and must not be recorded as approved."

approval_gate:
  required: true
  decisions_to_approve:
    - "Service goal"
    - "Primary users"
    - "Success criteria"
    - "Non-goals"
    - "Major scope boundaries"
  assumptions_to_confirm:
    - "Assumptions that affect the service goal"
    - "Assumptions that affect target users"
    - "Assumptions that affect success criteria"
    - "Assumptions that affect non-goals or scope"
  open_questions_to_resolve:
    - "Questions affecting stakeholders"
    - "Questions affecting privacy or security"
    - "Questions affecting requirements"
    - "Questions affecting scope"
    - "Questions affecting implementation direction"
  risks_to_review:
    - "Goal ambiguity"
    - "User ambiguity"
    - "Scope creep risk"
    - "Misaligned success criteria"
  artifacts_ready_for_review:
    - "/workflow/01_goal/01_service_goal.md"
    - "/workflow/01_goal/result.md"

validation:
  checklist:
    - "Service goal explains why the service should exist."
    - "Goal is not merely a feature list."
    - "Problem definition is explicit."
    - "Target users are explicit."
    - "Core value is clear."
    - "Desired outcomes are stated."
    - "Success criteria are high-level and reviewable."
    - "Success criteria are not acceptance criteria."
    - "Non-goals and scope boundaries are explicit."
    - "Assumptions are marked."
    - "Open questions are separated from assumptions."
    - "Risks and ambiguities are identified."
    - "Goal IDs are stable."
    - "Context packet is prepared for Stage 2."
    - "Human approval gate is present."
    - "No downstream stage work was performed."

  failure_conditions:
    - "No service idea or project context exists."
    - "Stage 0 is missing and no alternative context exists."
    - "Inputs conflict on service goal, primary users, success criteria, non-goals, or scope boundaries."
    - "A rejected option is requested again without explicit reopening."
    - "A required file cannot be read."
    - "A source artifact is superseded or rejected."

  blocker_report_required: true
  blocker_report_fields:
    - "blocking_issue"
    - "why_it_matters"
    - "affected_artifacts_or_stages"
    - "safe_partial_work_completed"
    - "human_decision_needed"

prohibited_actions:
  - "Create requirements."
  - "Write acceptance criteria."
  - "Perform stakeholder or risk analysis."
  - "Design architecture."
  - "Choose database or technical stack unless already approved."
  - "Create domain models."
  - "Create data models."
  - "Create test plans."
  - "Create tasks."
  - "Write implementation prompts."
  - "Inspect or modify code."
  - "Treat assumptions as approved decisions."
  - "Treat target users as finalized stakeholder roles."
  - "Collapse Stage 1 and Stage 2."
  - "Use context_packet.md as the only source of truth."
  - "Read all historical files by default."
  - "Revive rejected options without explicit instruction."
  - "Skip the human approval gate."

specialization_hooks:
  allowed: true
  examples:
    - name: "web_saas"
      may_add:
        - "customer value questions"
        - "tenant and admin value boundaries"
        - "SaaS onboarding assumptions"
    - name: "internal_tool"
      may_add:
        - "operator value questions"
        - "organizational workflow value questions"
        - "internal process constraints"
    - name: "mobile_app"
      may_add:
        - "device context questions"
        - "platform constraints"
        - "offline or permission concerns"
    - name: "ai_data_product"
      may_add:
        - "data source questions"
        - "evaluation purpose"
        - "model output value"
        - "human review concerns"
    - name: "regulated_security_sensitive"
      may_add:
        - "compliance constraints"
        - "privacy-sensitive questions"
        - "audit or risk boundaries"
    - name: "brownfield_legacy"
      may_add:
        - "replacement, extension, migration, modernization, or maintenance framing"
        - "compatibility constraints"
        - "existing-system review inputs"
  must_not_change:
    - "approval_rules"
    - "artifact_contract"
    - "assumption_handling"
    - "traceability_rules"
    - "stage_boundaries"

tool_wrapper_hooks:
  allowed:
    - "file_creation_commands"
    - "save_locations"
    - "sandbox_rules"
    - "review_workflow"
    - "command_invocation_conventions"
  must_not_change:
    - "stage_reasoning"
    - "approval_rules"
    - "artifact_contract"
    - "assumption_handling"
    - "traceability_rules"
    - "stage_boundaries"
