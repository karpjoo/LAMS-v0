  read_if_applicable:
  - path: /workflow/07_mvp_release/07_dependency_map.md
    condition: Created by 07c.
    purpose: Consolidate dependency-related release ordering.
  - path: /workflow/07_mvp_release/07_release_risk_register.md
    condition: Created by 07d or needed for significant risks.
    purpose: Include release risk summary.
  - path: /workflow/07_mvp_release/07_scope_tradeoff_analysis.md
    condition: Created by 07d or needed for human comparison.
    purpose: Summarize scope trade-off choices.
  - path: /workflow/07_mvp_release/07_specialization_scope_notes.md
    condition: Specialization notes exist.
    purpose: Include project-type scope concerns.
  - path: /workflow/07_mvp_release/_internal/07a_scope_input_review.md
    condition: Available.
    purpose: Check input review findings.
  - path: /workflow/07_mvp_release/_internal/07a_scope_inventory.md
    condition: Available.
    purpose: Check inventory completeness.
  - path: /workflow/07_mvp_release/_internal/07b_mvp_scope_classification_notes.md
    condition: Available.
    purpose: Check classification rationale.
  - path: /workflow/07_mvp_release/_internal/07c_release_slicing_notes.md
    condition: Available.
    purpose: Check release slicing rationale.
  - path: /workflow/07_mvp_release/_internal/07d_deferral_risk_notes.md
    condition: Available.
    purpose: Check deferral and risk rationale.
  - path: /workflow/02_stakeholders_risk/02_stakeholders.md
    condition: Stakeholder or actor priority affects MVP scope.
    purpose: Use role and stakeholder priority when classifying MVP scope.
  - path: /workflow/02_stakeholders_risk/02_risk_privacy_screening.md
    condition: Security, privacy, compliance, personal data, sensitive data, external API, or LLM transfer concerns affect release order.
    purpose: Identify non-deferrable safety and compliance scope.
  - path: /workflow/04_domain/04_ubiquitous_language.md
    condition: Scope item names or release slice names require terminology alignment.
    purpose: Keep scope language consistent with the domain language.
  - path: /workflow/04_domain/04_bounded_contexts.md
    condition: Release slices may cross bounded contexts.
    purpose: Avoid unsafe cross-context release boundaries.
  - path: /workflow/04_domain/04_domain_events.md
    condition: Event-driven workflows affect sequencing.
    purpose: Identify workflow and integration dependencies.
  - path: /workflow/05_architecture/05_api_contracts.md
    condition: The system exposes APIs.
    purpose: Identify API dependencies and public contract constraints.
  - path: /workflow/05_architecture/05_integration_contracts.md
    condition: External integrations exist or are proposed.
    purpose: Sequence integration-dependent scope.
  - path: /workflow/05_architecture/05_authz_model.md
    condition: Roles or permissions affect MVP safety.
    purpose: Identify authorization scope that cannot be deferred.
  - path: /workflow/06_data/06_logical_schema.md
    condition: Persistent data exists.
    purpose: Map requirements to data design dependencies.
  - path: /workflow/06_data/06_data_security_rules.md
    condition: Data access control affects release safety.
    purpose: Identify data security rules required in MVP.
  - path: /workflow/06_data/06_migration_plan.md
    condition: Migration affects release order.
    purpose: Sequence migration-dependent scope.
  - path: /workflow/00_intake/00_existing_context_review.md
    condition: This is a brownfield or legacy project.
    purpose: Respect compatibility, regression, and migration constraints.
  do_not_read_by_default:
  - path_or_pattern: full historical agent logs
    reason: Avoid dependence on prompt history.
  - path_or_pattern: superseded artifacts
    reason: Do not use stale artifacts as current truth.
  - path_or_pattern: unrelated drafts
    reason: Only approved or explicitly requested drafts may affect the sub-SKILL.
  - path_or_pattern: /workflow/08_test_strategy/**
    reason: Test strategy belongs to Stage 8.
  - path_or_pattern: /workflow/09_tasks/**
    reason: Task breakdown belongs to Stage 9.
  missing_input_handling:
    missing_required_input: Report the missing input, explain why it matters, mark blocking or non-blocking, and stop if the sub-SKILL cannot safely proceed.
    missing_stage_input: Create only safe partial analysis when official Stage 7 inputs are missing.
    no_project_context: Stop unless the human explicitly requests exploratory work.
    conflicting_inputs: Report the conflict and affected artifacts; do not silently resolve it.
    draft_or_unapproved_inputs: Use only if explicitly instructed and label outputs as draft.
user_directives:
  path: /workflow/07_mvp_release/USER_DIRECTIVES.md
  required_if_exists: true
  handling_rules:
  - Read before executing the SKILL.
  - Classify directives as approval, correction, preference, rejection, scope change, constraint, question, or new input.
  - Do not treat every directive as a globally approved decision.
  - Report conflicts with approved decisions.
  - Do not modify USER_DIRECTIVES.md unless explicitly instructed.
output_contract:
  mandatory_artifacts:
  - path: /workflow/07_mvp_release/07_mvp_scope.md
    purpose: Defines MVP scope classification, supporting scope, risks, assumptions, and approval candidates.
    required: true
    approval_required: true
    status_values: &id001
    - Draft
    - Approved
    - Needs Review
    required_sections:
    - Stage Status
    - MVP Definition Summary
    - Scope Classification Method
    - MVP Must-Have Scope
    - MVP Supporting / Enabling Scope
    - Should-Have Candidates
    - Could-Have Candidates
    - Later Release Items
    - Won't / Non-Scope Items
    - Security / Privacy / Compliance Scope Notes
    - Operational / Deployment Scope Notes
    - Scope Risks
    - Decision Candidates
    - Working Assumptions
    - Open Questions
    - Human Approval Required
  - path: /workflow/07_mvp_release/07_release_slices.md
    purpose: Defines coherent release slices, dependency-driven ordering, risks, and Stage 8 validation handoff.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Release Strategy Summary
    - Release Slice Overview
    - Release Slice Details
    - Dependency-Driven Ordering
    - Deferred Requirement Impact
    - Release Risks
    - Stage 8 Validation Handoff
    - Human Approval Required
  - path: /workflow/07_mvp_release/07_out_of_scope.md
    purpose: Records deferred items, explicit non-scope items, rejected options, and scope creep watchlist.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Purpose
    - Explicit Non-Scope Items
    - Deferred but Not Rejected Items
    - Rejected Options to Record
    - Scope Creep Watchlist
    - Open Questions Affecting Scope
    - Human Approval Required
  - path: /workflow/07_mvp_release/07_scope_traceability_matrix.md
    purpose: Links goals, requirements, acceptance criteria, scope categories, release slices, and Stage 8 validation handoff.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Scope Traceability Matrix
    - Traceability Gaps
  - path: /workflow/07_mvp_release/result.md
    purpose: Summarizes Stage 7 execution, outputs, decisions needed, assumptions, risks, traceability updates, and next step.
    required: true
    approval_required: true
    status_values: *id001
    required_sections:
    - Task Summary
    - Inputs Used
    - Outputs Created or Updated
    - MVP Scope Summary
    - Release Slice Summary
    - Out-of-Scope Summary
    - Decision Candidates
    - Working Assumptions
    - Open Questions
    - Risks and Constraints
    - Rejected or Superseded Options
    - Traceability Updates
    - N/A Items
    - Stage 8 Handoff Notes
    - Human Approval Required
    - Recommended Next Step
  conditional_artifacts:
  - path: /workflow/07_mvp_release/07_release_risk_register.md
    condition: Release sequencing introduces significant business, technical, security, privacy, operational, migration, or delivery risks.
    purpose: Records release risks, severity, likelihood, mitigation, and review needs.
    n_a_record_required: true
    approval_required: true
    status_values: *id001
  - path: /workflow/07_mvp_release/07_dependency_map.md
    condition: Release slices have non-trivial dependencies across requirements, bounded contexts, modules, APIs, integrations, data models, or migrations.
    purpose: Maps dependencies that affect release ordering.
    n_a_record_required: true
    approval_required: true
    status_values: *id001
  - path: /workflow/07_mvp_release/07_scope_tradeoff_analysis.md
    condition: Multiple plausible MVP boundaries require human comparison.
    purpose: Compares competing MVP boundary options and trade-offs.
    n_a_record_required: true
    approval_required: true
    status_values: *id001
  - path: /workflow/07_mvp_release/07_specialization_scope_notes.md
    condition: A project-type specialization adds scope concerns such as AI evaluation, mobile release constraints, regulated gates, or brownfield migration constraints.
    purpose: Records specialization-driven scope notes.
    n_a_record_required: true
    approval_required: true
    status_values: *id001
  n_a_record:
    required: true
    required_fields:
    - artifact
    - why_not_applicable
    - revisit_if
context_updates:
  files_to_update:
  - path: /workflow/context/context_packet.md
    condition: Only the finalizer updates the Stage 8 context packet; earlier sub-SKILLs may prepare local handoff notes.
    update_rule: Do not replace the public context packet before finalizer unless explicitly instructed.
  - path: /workflow/context/ASSUMPTIONS.md
    condition: Update if working assumptions need persistence.
    update_rule: Record assumptions without treating them as decisions.
  - path: /workflow/context/OPEN_QUESTIONS.md
    condition: Update if unresolved questions need persistence.
    update_rule: Record questions that may affect later stages.
  - path: /workflow/context/REJECTED_OPTIONS.md
    condition: Update only for explicitly rejected or superseded options.
    update_rule: Do not revive rejected options unless explicitly reopened.
  - path: /workflow/context/TRACEABILITY_MATRIX.md
    condition: Update if traceability links are introduced or changed.
    update_rule: Use stable IDs and preserve existing links.
  local_handoff:
    purpose: Prepare the next sub-SKILL with only the minimum operational context.
    next_subskill: 08 Test Strategy & Validation Harness after approval
  context_packet:
    path: /workflow/context/context_packet.md
    purpose: Prepare minimal context for Stage 8 Test Strategy & Validation Harness.
    next_stage: 08 Test Strategy & Validation Harness
    required_sections:
    - Current Project State
    - Approved Decisions
    - Working Assumptions
    - Open Questions
    - Rejected / Superseded Options
    - Constraints That Must Not Be Violated
    - Key Context for Next Stage
    - Required Inputs for Next Stage
    - Do Not Do
traceability:
  id_conventions:
    scope_items: SCOPE-001, SCOPE-002
    release_slices: REL-001, REL-002
    deferred_items: DEF-001, DEF-002
    non_scope_items: NON-SCOPE-001, NON-SCOPE-002
    risks: RISK-001, RISK-002
  required_links:
  - Requirement -> Acceptance Criteria
  - Requirement -> Scope Category
  - Requirement -> Release Slice or Deferral Status
  prohibited_links:
  - Do not create task or implementation evidence links during Stage 7.
  - Do not expose internal working artifacts as downstream source of truth.
classification_rules:
  approved_decision:
    rule: Only explicit human approval can create an approved decision.
    examples:
    - 'Approved: MVP includes only the selected Must scope items.'
    - 'Approved: Release 1 excludes advanced reporting.'
  decision_candidate:
    rule: Agent recommendations awaiting human approval must be marked as decision candidates.
  working_assumption:
    rule: Temporary beliefs needed for progress must remain assumptions until confirmed.
  open_question:
    rule: Unresolved issues that may affect scope, validation, security, data, or release order must be recorded as open questions.
  rejected_option:
    rule: Explicitly rejected or superseded options must be recorded and not revived unless reopened.
  recommendation:
    rule: Recommendations are not decisions and must not be recorded as approved.
approval_gate:
  required: true
  decisions_to_approve:
  - MVP scope
  - MVP supporting/enabling scope
  - Deferred items
  - Explicit out-of-scope items
  - Release order
  - Scope trade-offs
  - Security/privacy/compliance items required in MVP
  assumptions_to_confirm:
  - Working assumptions that affect MVP scope or release order.
  open_questions_to_resolve:
  - Questions that may affect this sub-SKILL or Stage 8 handoff.
  risks_to_review:
  - Risks introduced or discovered by this sub-SKILL.
  artifacts_ready_for_review:
  - /workflow/07_mvp_release/07_mvp_scope.md
  - /workflow/07_mvp_release/07_release_slices.md
  - /workflow/07_mvp_release/07_out_of_scope.md
  - /workflow/07_mvp_release/07_scope_traceability_matrix.md
  - /workflow/07_mvp_release/result.md
validation:
  checklist:
  - Inputs were checked according to the sub-SKILL contract.
  - Outputs match the sub-SKILL artifact contract.
  - Assumptions, open questions, risks, and decision candidates are separated.
  - No downstream stage depends on internal working artifacts.
  - No implementation tasks, tests, prompts, or code were created.
  failure_conditions:
  - Required input is missing.
  - Source artifact approval status is unknown.
  - Inputs conflict in a way that affects scope or release order.
  - Security/privacy/data/architecture constraints make the proposed output unsafe.
  blocker_report_required: true
  blocker_report_fields:
  - blocking_issue
  - why_it_matters
  - affected_artifacts_or_stages
  - safe_partial_work_completed
  - human_decision_needed
prohibited_actions:
- Do not execute later Stage 7 sub-SKILLs automatically.
- Do not create Stage 8 test strategy.
- Do not create Stage 9 task cards.
- Do not write implementation prompts or code.
- Do not update DECISIONS.md without explicit human approval.
- Do not treat this internal sub-SKILL output as approved public Stage 7 result.
specialization_hooks:
  allowed: true
  must_not_change:
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
tool_wrapper_hooks:
  allowed:
  - file_creation_commands
  - save_locations
  - sandbox_rules
  - review_workflow
  - command_invocation_conventions
  must_not_change:
  - stage_reasoning
  - approval_rules
  - artifact_contract
  - assumption_handling
  - traceability_rules
  - stage_boundaries
